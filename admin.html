<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Oficina de Skate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px; border: 2px solid #ff0000; }
        h2 { color: #ff0000; text-align: center; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        input, select { background: #222; color: #fff; border: 1px solid #333; }
        .btn-save { background: #ff0000; color: #fff; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #444; color: #fff; cursor: pointer; display: none; }
        
        /* LISTA DE EDIÇÃO */
        .item-admin { display: flex; align-items: center; justify-content: space-between; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 0.8rem; }
        .item-admin img { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; }
        .actions { display: flex; gap: 10px; }
        .btn-edit { color: #fbff00; cursor: pointer; background: none; width: auto; padding: 5px; }
        .btn-del { color: #ff4444; cursor: pointer; background: none; width: auto; padding: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>GESTOR OFICINA</h2>
    
    <input type="hidden" id="prod-id">
    <input type="text" id="prod-nome" placeholder="Nome do Produto">
    <input type="number" id="prod-preco" placeholder="Preço (Ex: 150.00)">
    <input type="text" id="prod-img" placeholder="Link da Imagem">
    
    <select id="prod-cat">
        <option value="SHAPES">SHAPES</option>
        <option value="RODAS">RODAS</option>
        <option value="ROLAMENTOS">ROLAMENTOS</option>
        <option value="TRUCK">TRUCKS</option>
        <option value="TÊNIS">TÊNIS</option>
        <option value="CALÇAS">CALÇAS</option>
        <option value="BERMUDAS">BERMUDAS</option>
        <option value="HOOKAH THUG">HOOKAH THUG</option>
        <option value="PROMOÇÕES">PROMOÇÕES</option>
    </select>

    <button class="btn-save" id="btn-main" onclick="salvarProduto()">LANÇAR PRODUTO</button>
    <button class="btn-cancel" id="btn-cancel" onclick="limparForm()">CANCELAR EDIÇÃO</button>

    <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
    
    <h3>ITENS LANÇADOS</h3>
    <div id="lista-admin"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
        authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
        projectId: "oficina-de-skate-9c49b",
        storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
        messagingSenderId: "905657745716",
        appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // SALVAR OU ATUALIZAR
    function salvarProduto() {
        const id = document.getElementById('prod-id').value;
        const dados = {
            nome: document.getElementById('prod-nome').value,
            preco: parseFloat(document.getElementById('prod-preco').value),
            img: document.getElementById('prod-img').value,
            cat: document.getElementById('prod-cat').value
        };

        if (id) {
            db.collection("produtos_oficina").doc(id).update(dados)
                .then(() => { alert("Atualizado!"); limparForm(); });
        } else {
            db.collection("produtos_oficina").add(dados)
                .then(() => { alert("Lançado!"); limparForm(); });
        }
    }

    // CARREGAR LISTA PARA EDIÇÃO
    function carregarListaAdmin() {
        db.collection("produtos_oficina").onSnapshot(snap => {
            const lista = document.getElementById('lista-admin');
            lista.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                lista.innerHTML += `
                    <div class="item-admin">
                        <img src="${p.img}">
                        <div style="flex-grow:1; margin-left:10px;">
                            <b>${p.nome}</b><br>R$ ${p.preco.toFixed(2)}
                        </div>
                        <div class="actions">
                            <button class="btn-edit" onclick="prepararEdicao('${doc.id}', '${p.nome}', ${p.preco}, '${p.img}', '${p.cat}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-del" onclick="excluirProduto('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });
    }

    function prepararEdicao(id, nome, preco, img, cat) {
        document.getElementById('prod-id').value = id;
        document.getElementById('prod-nome').value = nome;
        document.getElementById('prod-preco').value = preco;
        document.getElementById('prod-img').value = img;
        document.getElementById('prod-cat').value = cat;
        
        document.getElementById('btn-main').innerText = "SALVAR ALTERAÇÕES";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);
    }

    function excluirProduto(id) {
        if(confirm("Vai apagar esse item mesmo?")) {
            db.collection("produtos_oficina").doc(id).delete();
        }
    }

    function limparForm() {
        document.getElementById('prod-id').value = '';
        document.getElementById('prod-nome').value = '';
        document.getElementById('prod-preco').value = '';
        document.getElementById('prod-img').value = '';
        document.getElementById('btn-main').innerText = "LANÇAR PRODUTO";
        document.getElementById('btn-cancel').style.display = "none";
    }

    carregarListaAdmin();
</script>
</body>
</html>
