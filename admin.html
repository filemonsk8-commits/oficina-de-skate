<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Oficina de Skate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; padding: 15px; }
        
        /* HEADER DO ADMIN */
        header { 
            background: #111; padding: 15px; border-bottom: 3px solid #ff0000; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-radius: 8px;
        }
        .adm-title { font-family: 'Bebas Neue'; font-size: 1.8rem; color: #ff0000; }
        .btn-logout { background: #ff0000; color: #fff; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; text-decoration: none; font-size: 0.8rem; }

        /* BOXES DE CONTEÚDO */
        .box { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { font-family: 'Bebas Neue'; color: #fbff00; font-size: 1.5rem; margin-bottom: 15px; text-transform: uppercase; }
        
        input, select, textarea, button.btn-lancar { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; font-size: 0.9rem; }
        input, select, textarea { background: #222; color: #fff; border: 1px solid #444; }
        
        /* ÁREA DE UPLOAD IMGBB */
        .upload-box { 
            border: 2px dashed #fbff00; padding: 15px; text-align: center; 
            cursor: pointer; color: #fbff00; font-weight: bold; margin: 10px 0; border-radius: 5px; position: relative;
        }
        .upload-box:hover { background: #1a1a1a; }
        #img-preview { max-width: 100px; max-height: 100px; object-fit: cover; display: none; margin: 10px auto; border-radius: 5px; border: 1px solid #fff; }
        
        button.btn-lancar { background: #ff0000; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; border: 2px solid #000; }
        button.btn-lancar:disabled { background: #555; cursor: not-allowed; }
        
        .status-upload { display: none; color: #fbff00; font-size: 0.8rem; text-align: center; }

        /* LISTA DE EDIÇÃO/EXCLUSÃO */
        .item-admin { display: flex; align-items: center; background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 5px; border-left: 3px solid #ff0000; font-size: 0.8rem; }
        .item-admin img { width: 40px; height: 40px; object-fit: cover; margin-right: 10px; border-radius: 3px; }
        .item-info { flex-grow: 1; }
        .item-actions { display: flex; gap: 8px; }
        .btn-edit { color: #fbff00; cursor: pointer; background: none; border: none; }
        .btn-del { color: #ff4444; cursor: pointer; background: none; border: none; }
    </style>
</head>
<body>

<header>
    <h1 class="adm-title">OFICINA GESTOR</h1>
    <a href="index.html" class="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> SAIR</a>
</header>

<div class="container">
    
    <div class="box" style="border-color: #fbff00;">
        <h2><i class="fa-solid fa-video"></i> VÍDEO E MISSÃO DO SITE</h2>
        <input type="text" id="cfg-video" placeholder="Link do vídeo (Ex: drop.mp4)">
        <textarea id="cfg-missao" rows="2" placeholder="Escreva a missão da loja aqui..."></textarea>
        <button class="btn-lancar" style="background: #fbff00; color: #000; margin-top: 5px;" onclick="atualizarConfigs()">ATUALIZAR SITE</button>
    </div>

    <div class="box" style="border-color: #ff0000;">
        <h2><i class="fa-solid fa-box-open"></i> Lançar Peça Nova</h2>
        <input type="hidden" id="prod-id">
        <input type="text" id="prod-nome" placeholder="Nome da Peça">
        <input type="number" id="prod-preco" placeholder="Preço (R$)">
        
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i> CLIQUE PARA SUBIR FOTO
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="uploadParaImgBB(this)">
            <img id="img-preview">
            <div id="status-upload" class="status-upload">SUBINDO IMAGEM...</div>
        </div>
        <input type="hidden" id="prod-img"> <select id="prod-cat">
            <option value="SHAPES">SHAPES</option>
            <option value="RODAS">RODAS</option>
            <option value="TÊNIS">TÊNIS</option>
            <option value="CALÇAS">CALÇAS</option>
            <option value="BERMUDAS">BERMUDAS</option>
            <option value="HOOKAH THUG">HOOKAH THUG</option>
        </select>

        <button class="btn-lancar" id="btn-final" onclick="salvarProduto()">CONCLUIR LANÇAMENTO</button>
        <button id="btn-cancel" onclick="limparForm()" style="display:none; background:#444; color:#fff; width: 100%; padding: 8px; margin-top: 5px; border-radius: 4px; border: none; cursor: pointer;">CANCELAR EDIÇÃO</button>
    </div>

    <div class="box">
        <h2><i class="fa-solid fa-list"></i> Itens no Ar</h2>
        <div id="lista-admin"></div>
    </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    // Configuração do Firebase Eduardo
    const firebaseConfig = {
        apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
        authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
        projectId: "oficina-de-skate-9c49b",
        storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
        messagingSenderId: "905657745716",
        appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 1. ATUALIZAR VÍDEO E MISSÃO (NO FIREBASE CONFIG)
    function atualizarConfigs() {
        const videoLink = document.getElementById('cfg-video').value;
        const missaoText = document.getElementById('cfg-missao').value;
        db.collection("config").doc("site_data").set({
            video_url: videoLink,
            missao: missaoText
        }).then(() => alert("Site Atualizado!"));
    }

    // Carregar configs atuais
    db.collection("config").doc("site_data").onSnapshot(doc => {
        if(doc.exists) {
            document.getElementById('cfg-video').value = doc.data().video_url || '';
            document.getElementById('cfg-missao').value = doc.data().missao || '';
        }
    });

    // 2. FUNÇÃO DE UPLOAD REAL PARA IMGBB (SOLUÇÃO DO ERRO)
    async function uploadParaImgBB(input) {
        const file = input.files[0];
        if(!file) return;

        const status = document.getElementById('status-upload');
        const preview = document.getElementById('img-preview');
        const btnFinal = document.getElementById('btn-final');

        status.style.display = 'block';
        preview.style.display = 'none';
        btnFinal.disabled = true;
        btnFinal.innerText = "SUBINDO FOTO...";

        // Usando a sua API KEY configurada (ImgBB)
        const formData = new FormData();
        formData.append('image', file);

        try {
            const response = await fetch('https://api.imgbb.com/1/upload?key=666e632b7e6157143615951666e92c22', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Falha no upload');

            const data = await response.json();
            const urlFinal = data.data.url;

            // Sucesso! Preenche o campo oculto e mostra o preview
            document.getElementById('prod-img').value = urlFinal;
            preview.src = urlFinal;
            preview.style.display = 'block';
            status.style.display = 'none';
            btnFinal.disabled = false;
            btnFinal.innerText = "CONCLUIR LANÇAMENTO";

        } catch (error) {
            console.error("Erro ImgBB:", error);
            alert("Erro ao subir a imagem para o ImgBB. Tente novamente.");
            status.style.display = 'none';
            btnFinal.disabled = false;
            btnFinal.innerText = "CONCLUIR LANÇAMENTO";
        }
    }

    // 3. SALVAR PRODUTO NO FIREBASE (CADASTRO OU EDIÇÃO)
    function salvarProduto() {
        const id = document.getElementById('prod-id').value;
        const dados = {
            nome: document.getElementById('prod-nome').value,
            preco: parseFloat(document.getElementById('prod-preco').value),
            img: document.getElementById('prod-img').value,
            cat: document.getElementById('prod-cat').value
        };

        if(!dados.img) return alert("Suba a foto da peça primeiro!");

        if(id) {
            // Edição
            db.collection("produtos_oficina").doc(id).update(dados)
                .then(() => { alert("Atualizado!"); limparForm(); });
        } else {
            // Cadastro Novo
            db.collection("produtos_oficina").add(dados)
                .then(() => { alert("Lançado na Oficina!"); limparForm(); });
        }
    }

    // 4. LISTA DE GESTÃO (COM EDIÇÃO E EXCLUSÃO RESTAURADOS)
    db.collection("produtos_oficina").onSnapshot(snap => {
        const lista = document.getElementById('lista-admin');
        lista.innerHTML = '';
        snap.forEach(doc => {
            const p = doc.data();
            lista.innerHTML += `
                <div class="item-admin">
                    <img src="${p.img}">
                    <div class="item-info"><b>${p.nome}</b><br>R$ ${p.preco.toFixed(2)}</div>
                    <div class="item-actions">
                        <button class="btn-edit" onclick="prepararEdicao('${doc.id}','${p.nome}',${p.preco},'${p.img}','${p.cat}')"><i class="fa-solid fa-pen"></i></button>
                        <button class="btn-del" onclick="excluirProduto('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
        });
    });

    function prepararEdicao(id, nome, preco, img, cat) {
        document.getElementById('prod-id').value = id;
        document.getElementById('prod-nome').value = nome;
        document.getElementById('prod-preco').value = preco;
        document.getElementById('prod-img').value = img;
        document.getElementById('prod-cat').value = cat;
        
        // Preview da imagem que já existia
        const preview = document.getElementById('img-preview');
        preview.src = img;
        preview.style.display = 'block';

        // Mudar botões
        document.getElementById('btn-main').innerText = "SALVAR ALTERAÇÕES";
        document.getElementById('btn-cancel').style.display = "block";
        window.scrollTo(0,0);
    }

    function excluirProduto(id) {
        if(confirm("Vai apagar essa peça mesmo?")) {
            db.collection("produtos_oficina").doc(id).delete();
        }
    }

    function limparForm() {
        document.getElementById('prod-id').value = '';
        document.getElementById('prod-nome').value = '';
        document.getElementById('prod-preco').value = '';
        document.getElementById('prod-img').value = '';
        document.getElementById('preview-img').style.display = 'none';
        document.getElementById('btn-main').innerText = "CONCLUIR LANÇAMENTO";
        document.getElementById('btn-cancel').style.display = "none";
    }
</script>
</body>
</html>
