<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Oficina - Eduardo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; padding: 15px; }
        header { 
            background: #111; padding: 15px; border-bottom: 3px solid #ff0000; 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 20px; border-radius: 8px;
        }
        .adm-title { font-family: 'Bebas Neue'; font-size: 1.8rem; color: #ff0000; }
        .btn-logout { background: #ff0000; color: #fff; border: none; padding: 8px 15px; cursor: pointer; border-radius: 4px; font-weight: bold; text-decoration: none; font-size: 0.8rem; }
        .box { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        h2 { font-family: 'Bebas Neue'; color: #fbff00; font-size: 1.5rem; margin-bottom: 15px; text-transform: uppercase; }
        input, select, textarea, button.btn-lancar { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; font-size: 0.9rem; }
        input, select, textarea { background: #222; color: #fff; border: 1px solid #444; }
        .upload-box { border: 2px dashed #fbff00; padding: 15px; text-align: center; cursor: pointer; color: #fbff00; font-weight: bold; margin: 10px 0; border-radius: 5px; }
        #img-preview { max-width: 100px; max-height: 100px; object-fit: cover; display: none; margin: 10px auto; border-radius: 5px; border: 1px solid #fff; }
        button.btn-lancar { background: #ff0000; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .status-upload { display: none; color: #fbff00; font-size: 0.8rem; text-align: center; margin-bottom: 10px; }
        .item-admin { display: flex; align-items: center; background: #1a1a1a; padding: 10px; margin-bottom: 5px; border-radius: 5px; border-left: 3px solid #ff0000; }
        .item-admin img { width: 40px; height: 40px; object-fit: cover; margin-right: 10px; border-radius: 3px; }
        .btn-edit { color: #fbff00; cursor: pointer; background: none; border: none; margin-left: 10px; font-size: 1.1rem; }
        .btn-del { color: #ff4444; cursor: pointer; background: none; border: none; margin-left: 10px; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <h1 class="adm-title">OFICINA GESTOR</h1>
    <a href="index.html" class="btn-logout">SAIR</a>
</header>

<div class="container">
    <div class="box" style="border-color: #fbff00;">
        <h2>VÍDEO E MISSÃO</h2>
        <input type="text" id="cfg-video" placeholder="Link do vídeo (.mp4)">
        <textarea id="cfg-missao" rows="2" placeholder="Missão da Loja"></textarea>
        <button class="btn-lancar" style="background: #fbff00; color: #000;" onclick="atualizarConfigs()">ATUALIZAR SITE</button>
    </div>

    <div class="box" style="border-color: #ff0000;">
        <h2>Lançar Peça</h2>
        <input type="hidden" id="prod-id">
        <input type="text" id="prod-nome" placeholder="Nome da Peça">
        <input type="number" id="prod-preco" placeholder="Preço (R$)">
        
        <div class="upload-box" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i> SUBIR FOTO (IMGBB)
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="uploadParaImgBB(this)">
            <img id="img-preview">
            <div id="status-upload" class="status-upload">SUBINDO IMAGEM...</div>
        </div>
        <input type="hidden" id="prod-img">

        <select id="prod-cat">
            <option value="SHAPES">SHAPES</option>
            <option value="RODAS">RODAS</option>
            <option value="TÊNIS">TÊNIS</option>
            <option value="BERMUDAS">BERMUDAS</option>
            <option value="CALÇAS">CALÇAS</option>
            <option value="HOOKAH THUG">HOOKAH THUG</option>
        </select>

        <button class="btn-lancar" id="btn-final" onclick="salvarProduto()">CONCLUIR LANÇAMENTO</button>
    </div>

    <div class="box">
        <h2>Itens Cadastrados</h2>
        <div id="lista-admin"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
        authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
        projectId: "oficina-de-skate-9c49b",
        storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
        messagingSenderId: "905657745716",
        appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // UPLOAD COM A SUA CHAVE CORRETA
    async function uploadParaImgBB(input) {
        const file = input.files[0];
        if(!file) return;
        const status = document.getElementById('status-upload');
        const preview = document.getElementById('img-preview');
        const btn = document.getElementById('btn-final');
        const imgInput = document.getElementById('prod-img');
        
        status.style.display = 'block';
        btn.disabled = true;

        const formData = new FormData();
        formData.append('image', file);
        
        try {
            // USANDO A SUA CHAVE: a499de8c197f35e80312d4fa507c3b29
            const res = await fetch('https://api.imgbb.com/1/upload?key=a499de8c197f35e80312d4fa507c3b29', {
                method: 'POST', body: formData
            });
            const data = await res.json();
            if(data.success) {
                imgInput.value = data.data.url;
                preview.src = data.data.url;
                preview.style.display = 'block';
                status.style.display = 'none';
                btn.disabled = false;
            } else { throw new Error(data.error.message); }
        } catch(e) { 
            alert("Erro no ImgBB: " + e.message); 
            status.style.display = 'none'; 
            btn.disabled = false; 
        }
    }

    function salvarProduto() {
        const id = document.getElementById('prod-id').value;
        const dados = {
            nome: document.getElementById('prod-nome').value,
            preco: parseFloat(document.getElementById('prod-preco').value),
            img: document.getElementById('prod-img').value,
            cat: document.getElementById('prod-cat').value
        };
        if(!dados.img) return alert("Suba a foto primeiro!");
        if(id) {
            db.collection("produtos_oficina").doc(id).update(dados).then(() => { alert("Atualizado!"); location.reload(); });
        } else {
            db.collection("produtos_oficina").add(dados).then(() => { alert("Lançado!"); location.reload(); });
        }
    }

    function atualizarConfigs() {
        db.collection("config").doc("site_data").set({
            video_url: document.getElementById('cfg-video').value,
            missao: document.getElementById('cfg-missao').value
        }).then(() => alert("Atualizado!"));
    }

    db.collection("produtos_oficina").onSnapshot(snap => {
        const lista = document.getElementById('lista-admin');
        lista.innerHTML = '';
        snap.forEach(doc => {
            const p = doc.data();
            lista.innerHTML += `<div class="item-admin">
                <img src="${p.img}">
                <div style="flex-grow:1; font-size:0.7rem;">${p.nome}</div>
                <button class="btn-edit" onclick="prepararEdicao('${doc.id}','${p.nome}',${p.preco},'${p.img}','${p.cat}')"><i class="fa-solid fa-pen"></i></button>
                <button class="btn-del" onclick="excluir('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
            </div>`;
        });
    });

    function prepararEdicao(id, nome, preco, img, cat) {
        document.getElementById('prod-id').value = id;
        document.getElementById('prod-nome').value = nome;
        document.getElementById('prod-preco').value = preco;
        document.getElementById('prod-img').value = img;
        document.getElementById('prod-cat').value = cat;
        document.getElementById('img-preview').src = img;
        document.getElementById('img-preview').style.display = 'block';
        window.scrollTo(0,0);
    }

    function excluir(id) { if(confirm("Apagar?")) db.collection("produtos_oficina").doc(id).delete(); }
</script>
</body>
</html>
