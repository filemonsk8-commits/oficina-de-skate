<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Oficina de Skate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #111; padding: 20px; border-radius: 10px; border: 2px solid #ff0000; }
        h2 { color: #ff0000; text-align: center; font-size: 1.2rem; text-transform: uppercase; }
        
        label { display: block; margin-top: 15px; font-size: 0.8rem; color: #888; }
        input, select, textarea, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; font-size: 0.9rem; }
        input, select, textarea { background: #222; color: #fff; border: 1px solid #333; }
        
        /* ÁREA DE UPLOAD */
        .upload-box { 
            border: 2px dashed #fbff00; padding: 20px; text-align: center; 
            cursor: pointer; color: #fbff00; font-weight: bold; margin-bottom: 10px;
        }
        #img-preview { width: 100px; height: 100px; object-fit: cover; display: none; margin: 10px auto; border-radius: 5px; border: 1px solid #fff; }
        
        .btn-lancar { background: #ff0000; color: #fff; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-config { background: #fbff00; color: #000; font-weight: bold; cursor: pointer; }
        
        .loading { display: none; color: #fbff00; font-size: 0.8rem; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2><i class="fa-solid fa-video"></i> VÍDEO E MISSÃO</h2>
    <input type="text" id="link-video" placeholder="Link do vídeo (Ex: drop.mp4)">
    <textarea id="texto-missao" rows="2" placeholder="Escreva a missão da loja..."></textarea>
    <button class="btn-config" onclick="salvarConfig()">ATUALIZAR VÍDEO E MISSÃO</button>

    <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">

    <h2><i class="fa-solid fa-plus"></i> LANÇAR PRODUTO</h2>
    
    <div class="upload-box" onclick="document.getElementById('input-file').click()">
        <i class="fa-solid fa-camera"></i> CLIQUE PARA SUBIR FOTO
        <input type="file" id="input-file" style="display:none" accept="image/*" onchange="fazerUpload(this)">
        <img id="img-preview">
        <div id="status-upload" class="loading">SUBINDO IMAGEM...</div>
    </div>

    <input type="hidden" id="url-imagem-final">
    <input type="text" id="nome-item" placeholder="Nome da Peça">
    <input type="number" id="preco-item" placeholder="Preço (R$)">
    
    <select id="cat-item">
        <option value="SHAPES">SHAPES</option>
        <option value="RODAS">RODAS</option>
        <option value="TRUCKS">TRUCKS</option>
        <option value="TÊNIS">TÊNIS</option>
        <option value="BERMUDAS">BERMUDAS</option>
        <option value="CALÇAS">CALÇAS</option>
        <option value="HOOKAH THUG">HOOKAH THUG</option>
    </select>

    <button class="btn-lancar" id="btn-final" onclick="lancarProduto()">CONCLUIR LANÇAMENTO</button>
</div>

<script>
    // FUNÇÃO DE UPLOAD (SISTEMA EXTERNO)
    async function fazerUpload(input) {
        const file = input.files[0];
        if (!file) return;

        const status = document.getElementById('status-upload');
        const preview = document.getElementById('img-preview');
        const btn = document.getElementById('btn-final');

        status.style.display = 'block';
        btn.disabled = true;

        // Montando o formulário para o serviço de imagens
        const formData = new FormData();
        formData.append('image', file);

        try {
            // Usando o ImgBB (Serviço que a gente configurou)
            const response = await fetch('https://api.imgbb.com/1/upload?key=666e632b7e6157143615951666e92c22', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            const url = data.data.url;

            document.getElementById('url-imagem-final').value = url;
            preview.src = url;
            preview.style.display = 'block';
            status.style.display = 'none';
            btn.disabled = false;
            alert("Imagem carregada com sucesso!");

        } catch (error) {
            alert("Erro ao subir imagem. Tente novamente.");
            status.style.display = 'none';
            btn.disabled = false;
        }
    }

    function lancarProduto() {
        const nome = document.getElementById('nome-item').value;
        const preco = document.getElementById('preco-item').value;
        const img = document.getElementById('url-imagem-final').value;
        const cat = document.getElementById('cat-item').value;

        if (!img) return alert("Suba a foto primeiro!");

        // Aqui vai a lógica que salva no seu sistema de dados (JSON ou LocalStorage)
        console.log("Produto Lançado:", { nome, preco, img, cat });
        alert(nome + " lançado na Oficina!");
        location.reload(); 
    }

    function salvarConfig() {
        const video = document.getElementById('link-video').value;
        const missao = document.getElementById('texto-missao').value;
        alert("Vídeo e Missão atualizados!");
    }
</script>

</body>
</html>
