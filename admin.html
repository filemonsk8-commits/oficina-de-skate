<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL OFICINA - ADMIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; padding: 20px; }
        h1 { font-family: 'Bebas Neue'; color: #ff0000; font-size: 3rem; text-align: center; text-shadow: 2px 2px #fbff00; margin-bottom: 20px; }
        
        .card-admin { background: #111; border: 2px solid #ff0000; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        h2 { font-family: 'Bebas Neue'; color: #fbff00; margin-bottom: 15px; border-bottom: 1px solid #333; }

        label { display: block; margin: 10px 0 5px; font-size: 0.8rem; color: #888; }
        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; font-family: sans-serif; }
        
        .btn-salvar { background: #ff0000; color: #fff; border: none; width: 100%; padding: 15px; margin-top: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-salvar:hover { background: #fbff00; color: #000; }

        .lista-itens { margin-top: 20px; display: grid; gap: 10px; }
        .item-gerenciado { background: #222; padding: 10px; display: flex; justify-content: space-between; align-items: center; border-radius: 5px; font-size: 0.8rem; }
        .btn-del { color: #ff0000; cursor: pointer; background: none; border: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>PAINEL ADMINISTRATIVO</h1>

    <div class="card-admin">
        <h2><i class="fa-solid fa-bullhorn"></i> MISSÃO DA OFICINA</h2>
        <label>Frase que aparece no topo do site:</label>
        <textarea id="input-missao" rows="2" placeholder="Ex: O MELHOR DROP DE SKATE DA REGIÃO..."></textarea>
        <button class="btn-salvar" onclick="salvarMissao()">ATUALIZAR MISSÃO</button>
    </div>

    <div class="card-admin">
        <h2><i class="fa-solid fa-box-open"></i> NOVO PRODUTO</h2>
        <input type="text" id="nome-p" placeholder="Nome do Produto">
        <input type="number" id="preco-p" placeholder="Preço (ex: 150.00)">
        <input type="text" id="img-p" placeholder="Link da Imagem (URL)">
        <select id="cat-p">
            <option value="SHAPES">SHAPES</option>
            <option value="TRUCKS">TRUCKS</option>
            <option value="RODAS">RODAS</option>
            <option value="ROLAMENTOS">ROLAMENTOS</option>
            <option value="ACESSÓRIOS">ACESSÓRIOS</option>
            <option value="TÊNIS">TÊNIS</option>
            <option value="BERMUDAS">BERMUDAS</option>
            <option value="CALÇAS">CALÇAS</option>
            <option value="HOOKAH THUG">HOOKAH THUG</option>
        </select>
        <button class="btn-salvar" onclick="addProduto('produtos_oficina')">CADASTRAR NA VITRINE</button>
        <button class="btn-salvar" style="background:#fbff00; color:#000;" onclick="addProduto('promocoes_oficina')">CADASTRAR COMO PROMOÇÃO 🔥</button>
    </div>

    <div class="card-admin">
        <h2><i class="fa-solid fa-list"></i> GERENCIAR ESTOQUE</h2>
        <div id="lista-estoque" class="lista-itens"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // SALVAR MISSÃO
        function salvarMissao() {
            const texto = document.getElementById('input-missao').value;
            db.collection("config").doc("site_data").set({ missao: texto }, { merge: true })
            .then(() => alert("Missão atualizada!"));
        }

        // ADICIONAR PRODUTO OU PROMOÇÃO
        function addProduto(colecao) {
            const nome = document.getElementById('nome-p').value;
            const preco = parseFloat(document.getElementById('preco-p').value);
            const img = document.getElementById('img-p').value;
            const cat = document.getElementById('cat-p').value;

            if(!nome || !preco) return alert("Preencha nome e preço!");

            db.collection(colecao).add({ nome, preco, img, cat })
            .then(() => {
                alert("Cadastrado com sucesso!");
                document.getElementById('nome-p').value = '';
                document.getElementById('preco-p').value = '';
            });
        }

        // CARREGAR E DELETAR ITENS
        function carregarEstoque() {
            db.collection("produtos_oficina").onSnapshot(snap => {
                const lista = document.getElementById('lista-estoque');
                lista.innerHTML = '<h3>Produtos da Vitrine</h3>';
                snap.forEach(doc => {
                    const p = doc.data();
                    lista.innerHTML += `
                        <div class="item-gerenciado">
                            <span>${p.nome} (${p.cat})</span>
                            <button class="btn-del" onclick="deletar('${doc.id}', 'produtos_oficina')"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                });
            });
        }

        function deletar(id, colecao) {
            if(confirm("Deseja apagar este item?")) {
                db.collection(colecao).doc(id).delete();
            }
        }

        // CARREGA A MISSÃO ATUAL AO ABRIR
        db.collection("config").doc("site_data").get().then(doc => {
            if(doc.exists) document.getElementById('input-missao').value = doc.data().missao;
        });

        carregarEstoque();
    </script>
</body>
</html>
