<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel do Chefe - Oficina de Skate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; text-transform: uppercase; padding: 20px; }
        
        .header-admin { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #ff0000; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { font-family: 'Bebas Neue'; font-size: 2.5rem; color: #ff0000; }
        
        .btn-sair { background: #ff0000; color: #fff; border: none; padding: 10px 20px; font-family: 'Archivo Black'; cursor: pointer; border-radius: 5px; font-size: 0.8rem; }

        .admin-box { background: #111; border: 2px solid #fff; padding: 20px; margin-bottom: 30px; border-radius: 8px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #fff; color: #fff; font-family: 'Archivo Black'; }
        
        /* ESTILO DO UPLOAD */
        .upload-area { border: 2px dashed #fbff00; padding: 15px; text-align: center; margin: 10px 0; cursor: pointer; }
        .upload-area:hover { background: #222; }
        #progresso-txt { font-size: 0.7rem; color: #fbff00; margin-top: 5px; display: none; }

        .btn-save { width: 100%; background: #ff0000; color: #fff; border: none; padding: 15px; cursor: pointer; font-size: 1rem; font-family: 'Archivo Black'; }
        .btn-edit { background: #fbff00; color: #000; }
        .btn-del { background: #ff0000; color: #fff; }

        .prod-item { display: flex; align-items: center; background: #111; border: 1px solid #333; margin-bottom: 10px; padding: 10px; gap: 15px; }
        .prod-img { width: 60px; height: 60px; object-fit: cover; border: 1px solid #ff0000; }
        .prod-info { flex-grow: 1; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="header-admin">
        <h1><i class="fa-solid fa-screwdriver-wrench"></i> PAINEL DO CHEFE</h1>
        <button class="btn-sair" onclick="window.location.href='index.html'"><i class="fa-solid fa-right-from-bracket"></i> SAIR</button>
    </div>

    <div class="admin-box">
        <h2 id="form-title">ADICIONAR NOVO ITEM</h2>
        
        <input type="text" id="prod-nome" placeholder="NOME DO PRODUTO">
        <input type="number" id="prod-preco" placeholder="PREÇO" step="0.01">
        
        <label style="font-size: 0.7rem; color:#fbff00;">FOTO DO PRODUTO:</label>
        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <i class="fa-solid fa-cloud-arrow-up"></i> CLIQUE PARA SUBIR FOTO
            <input type="file" id="file-input" style="display:none" accept="image/*" onchange="uploadImagem(this)">
            <p id="progresso-txt">SUBINDO IMAGEM... AGUARDE</p>
        </div>
        <input type="hidden" id="prod-img-url"> <select id="prod-cat">
            <option value="SHAPES">SHAPES</option>
            <option value="RODAS">RODAS</option>
            <option value="TRUCK">TRUCK</option>
            <option value="TÊNIS">TÊNIS</option>
            <option value="HOOKAH THUG">HOOKAH THUG</option>
            <option value="BERMUDAS">BERMUDAS</option>
            <option value="PROMOÇÕES">PROMOÇÕES</option>
        </select>

        <button class="btn-save" id="btn-main" onclick="salvarProduto()">LANÇAR DROP</button>
        <button class="btn-save" id="btn-cancel" style="display:none; background:#555; margin-top:5px;" onclick="resetForm()">CANCELAR</button>
    </div>

    <h2>ESTOQUE ATUAL</h2>
    <div id="lista-estoque"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let editandoId = null;

        // --- FUNÇÃO DE UPLOAD ---
        function uploadImagem(input) {
            const file = input.files[0];
            if(!file) return;

            const txt = document.getElementById('progresso-txt');
            txt.style.display = "block";
            
            const storageRef = storage.ref('produtos/' + file.name);
            const task = storageRef.put(file);

            task.on('state_changed', 
                null, 
                (err) => { alert("Erro no upload!"); }, 
                () => {
                    task.snapshot.ref.getDownloadURL().then((url) => {
                        document.getElementById('prod-img-url').value = url;
                        txt.innerText = "IMAGEM CARREGADA COM SUCESSO! ✅";
                    });
                }
            );
        }

        async function salvarProduto() {
            const nome = document.getElementById('prod-nome').value;
            const preco = parseFloat(document.getElementById('prod-preco').value);
            const img = document.getElementById('prod-img-url').value;
            const cat = document.getElementById('prod-cat').value;

            if(!nome || !preco || !img) return alert("ERRO: Selecione a imagem e preencha os dados!");

            const dados = { nome, preco, img, cat };

            if(editandoId) {
                await db.collection("produtos_oficina").doc(editandoId).update(dados);
                alert("PRODUTO ATUALIZADO!");
            } else {
                await db.collection("produtos_oficina").add(dados);
                alert("PRODUTO CADASTRADO!");
            }
            location.reload(); // Recarrega para limpar tudo
        }

        function carregarLista() {
            db.collection("produtos_oficina").onSnapshot(snap => {
                const lista = document.getElementById('lista-estoque');
                lista.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    lista.innerHTML += `
                        <div class="prod-item">
                            <img src="${p.img}" class="prod-img">
                            <div class="prod-info"><strong>${p.nome}</strong><br>R$ ${p.preco.toFixed(2)}</div>
                            <button class="btn-del" onclick="deletar('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                });
            });
        }

        function deletar(id) {
            if(confirm("Apagar produto?")) db.collection("produtos_oficina").doc(id).delete();
        }

        carregarLista();
    </script>
</body>
</html>
