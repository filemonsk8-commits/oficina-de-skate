<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL OFICINA - ADMIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; padding: 15px; }
        
        /* TELA DE LOGIN */
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #login-screen input { width:200px; text-align:center; margin-bottom:15px; font-size:1.5rem; letter-spacing:5px; background:#111; border:2px solid #ff0000; color:#fff; padding:10px; border-radius:5px; }
        
        /* LAYOUT ADMIN */
        #admin-content { display:none; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 3px solid #ff0000; padding-bottom: 10px; }
        h1 { font-family: 'Bebas Neue'; color: #ff0000; font-size: 2.2rem; }
        .btn-sair { background: #ff0000; color: #fff; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .card-admin { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        h2 { font-family: 'Bebas Neue'; color: #fbff00; font-size: 1.5rem; margin-bottom: 10px; }

        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 10px; font-family: sans-serif; }
        .btn-acao { background: #ff0000; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .btn-edit { background: #007bff; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; margin-right: 5px; }
        .btn-del { background: #dc3545; color: #fff; border: none; padding: 5px 10px; border-radius: 3px; cursor: pointer; }

        .item-lista { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 0.8rem; }
        .thumb-admin { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="margin-bottom: 20px;">ACESSO RESTRITO</h1>
        <input type="password" id="pass-input" placeholder="SENHA">
        <button class="btn-acao" style="width:200px;" onclick="checkPass()">ENTRAR</button>
    </div>

    <div id="admin-content">
        <div class="header-admin">
            <h1>OFICINA ADMIN</h1>
            <button class="btn-sair" onclick="sair()">SAIR <i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <div class="card-admin">
            <h2>MISSÃO DO TOPO</h2>
            <textarea id="missao-text" rows="2"></textarea>
            <button class="btn-acao" onclick="updateMissao()">SALVAR MISSÃO</button>
        </div>

        <div class="card-admin" id="form-container">
            <h2 id="form-title">LANÇAR NOVO PRODUTO</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="nome-p" placeholder="Nome do Produto">
            <input type="number" id="preco-p" placeholder="Preço (R$)">
            <input type="text" id="img-p" placeholder="Link Direto ImgBB (ex: https://i.ibb.co/...)">
            <select id="cat-p">
                <option value="SHAPES">SHAPES</option>
                <option value="TRUCKS">TRUCKS</option>
                <option value="RODAS">RODAS</option>
                <option value="ROLAMENTOS">ROLAMENTOS</option>
                <option value="ACESSÓRIOS">ACESSÓRIOS</option>
                <option value="TÊNIS">TÊNIS</option>
                <option value="BERMUDAS">BERMUDAS</option>
                <option value="CALÇAS">CALÇAS</option>
                <option value="PROMOÇÕES">PROMOÇÕES</option>
            </select>
            <button class="btn-acao" id="btn-principal" onclick="salvarProduto()">CADASTRAR</button>
            <button class="btn-acao" id="btn-cancelar" style="display:none; background:#555;" onclick="limparForm()">CANCELAR EDIÇÃO</button>
        </div>

        <div class="card-admin">
            <h2>ESTOQUE LANÇADO</h2>
            <div id="lista-estoque"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // SEGURANÇA
        function checkPass() {
            const pass = document.getElementById('pass-input').value;
            if(pass === "2203") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                carregarEstoque();
            } else {
                alert("SENHA INCORRETA!");
            }
        }

        function sair() { location.reload(); }

        // MISSÃO
        function updateMissao() {
            const txt = document.getElementById('missao-text').value;
            db.collection("config").doc("site_data").set({ missao: txt }, { merge: true })
            .then(() => alert("Missão atualizada!"));
        }

        // CARREGA MISSÃO AO ENTRAR
        db.collection("config").doc("site_data").get().then(doc => {
            if(doc.exists) document.getElementById('missao-text').value = doc.data().missao;
        });

        // SALVAR (CADASTRO OU EDIÇÃO)
        function salvarProduto() {
            const id = document.getElementById('edit-id').value;
            const dados = {
                nome: document.getElementById('nome-p').value,
                preco: parseFloat(document.getElementById('preco-p').value),
                img: document.getElementById('img-p').value,
                cat: document.getElementById('cat-p').value
            };

            if(!dados.nome || !dados.preco) return alert("Preencha Nome e Preço!");

            if(id) {
                // Editar
                db.collection("produtos_oficina").doc(id).update(dados)
                .then(() => { alert("Produto Editado!"); limparForm(); });
            } else {
                // Novo
                db.collection("produtos_oficina").add(dados)
                .then(() => { alert("Produto Lançado!"); limparForm(); });
            }
        }

        function limparForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('nome-p').value = "";
            document.getElementById('preco-p').value = "";
            document.getElementById('img-p').value = "";
            document.getElementById('form-title').innerText = "LANÇAR NOVO PRODUTO";
            document.getElementById('btn-principal').innerText = "CADASTRAR";
            document.getElementById('btn-cancelar').style.display = "none";
        }

        // CARREGAR LISTA
        function carregarEstoque() {
            db.collection("produtos_oficina").orderBy("cat").onSnapshot(snap => {
                const lista = document.getElementById('lista-estoque');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    lista.innerHTML += `
                        <div class="item-lista">
                            <div style="display:flex; align-items:center;">
                                <img src="${p.img}" class="thumb-admin" onerror="this.src='https://via.placeholder.com/40'">
                                <div>
                                    <b>${p.nome}</b><br>
                                    <small>${p.cat} - R$ ${p.preco.toFixed(2)}</small>
                                </div>
                            </div>
                            <div>
                                <button class="btn-edit" onclick="prepararEdicao('${doc.id}', '${p.nome}', ${p.preco}, '${p.img}', '${p.cat}')"><i class="fa-solid fa-pen"></i></button>
                                <button class="btn-del" onclick="deletar('${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>`;
                });
            });
        }

        function prepararEdicao(id, nome, preco, img, cat) {
            document.getElementById('edit-id').value = id;
            document.getElementById('nome-p').value = nome;
            document.getElementById('preco-p').value = preco;
            document.getElementById('img-p').value = img;
            document.getElementById('cat-p').value = cat;
            
            document.getElementById('form-title').innerText = "EDITANDO PRODUTO";
            document.getElementById('btn-principal').innerText = "SALVAR ALTERAÇÕES";
            document.getElementById('btn-cancelar').style.display = "block";
            window.scrollTo(0,0);
        }

        function deletar(id) {
            if(confirm("Apagar este produto permanentemente?")) {
                db.collection("produtos_oficina").doc(id).delete();
            }
        }
    </script>
</body>
</html>
