<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Oficina - Eduardo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; padding: 10px; }
        header { background: #111; padding: 15px; border-bottom: 3px solid #ff0000; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-radius: 8px; }
        .adm-title { font-family: 'Bebas Neue'; font-size: 1.5rem; color: #ff0000; }
        .btn-logout { background: #ff0000; color: #fff; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; text-decoration: none; font-size: 0.7rem; }
        .box { background: #111; padding: 15px; border-radius: 10px; border: 1px solid #333; margin-bottom: 15px; }
        h2 { font-family: 'Bebas Neue'; color: #fbff00; font-size: 1.3rem; margin-bottom: 10px; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
        input, select, textarea, button.btn-lancar { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; font-size: 0.85rem; }
        input, select, textarea { background: #222; color: #fff; border: 1px solid #444; }
        .upload-box { border: 2px dashed #fbff00; padding: 10px; text-align: center; cursor: pointer; color: #fbff00; font-size: 0.8rem; margin: 5px 0; border-radius: 5px; }
        .img-preview { max-width: 80px; display: none; margin: 5px auto; border-radius: 5px; border: 1px solid #fff; }
        button.btn-lancar { background: #ff0000; color: #fff; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .status-up { display: none; color: #fbff00; font-size: 0.7rem; text-align: center; margin-bottom: 5px; }
        .item-admin { display: flex; align-items: center; background: #1a1a1a; padding: 8px; margin-bottom: 5px; border-radius: 5px; border-left: 3px solid #ff0000; }
        .item-admin img { width: 35px; height: 35px; object-fit: cover; margin-right: 10px; }
        .btn-del { color: #ff4444; background: none; border: none; margin-left: auto; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1 class="adm-title">OFICINA GESTOR</h1>
    <a href="index.html" class="btn-logout">SAIR</a>
</header>

<div class="box">
    <h2><i class="fa-solid fa-video"></i> 1. Vídeo Destaque</h2>
    <input type="text" id="cfg-video" placeholder="Link do vídeo (Ex: drop.mp4)">
    <button class="btn-lancar" onclick="salvarConfig('video_url', 'cfg-video')" style="background:#222; color:#fbff00;">ATUALIZAR VÍDEO</button>
</div>

<div class="box">
    <h2><i class="fa-solid fa-bullseye"></i> 2. Missão da Loja</h2>
    <textarea id="cfg-missao" rows="2" placeholder="Escreva a missão aqui..."></textarea>
    <button class="btn-lancar" onclick="salvarConfig('missao', 'cfg-missao')" style="background:#222; color:#fbff00;">ATUALIZAR MISSÃO</button>
</div>

<div class="box" style="border-color: #ff0000;">
    <h2><i class="fa-solid fa-tag"></i> 3. Lançar Produto</h2>
    <input type="text" id="prod-nome" placeholder="Nome do Produto">
    <input type="number" id="prod-preco" placeholder="Preço (R$)">
    <div class="upload-box" onclick="document.getElementById('file-prod').click()">
        <i class="fa-solid fa-camera"></i> FOTO DO PRODUTO
        <input type="file" id="file-prod" style="display:none" onchange="uploadImg(this, 'url-prod', 'pre-prod')">
        <img id="pre-prod" class="img-preview">
    </div>
    <div id="status-prod" class="status-up">SUBINDO...</div>
    <input type="hidden" id="url-prod">
    <select id="prod-cat">
        <option value="SHAPES">SHAPES</option>
        <option value="RODAS">RODAS</option>
        <option value="ROLAMENTOS">ROLAMENTOS</option>
        <option value="TÊNIS">TÊNIS</option>
        <option value="BERMUDAS">BERMUDAS</option>
        <option value="CALÇAS">CALÇAS</option>
    </select>
    <button class="btn-lancar" onclick="salvarItem('produtos_oficina', 'prod')">LANÇAR PRODUTO</button>
</div>

<div class="box" style="border-color: #fbff00;">
    <h2><i class="fa-solid fa-fire"></i> 4. Lançar Promoção</h2>
    <input type="text" id="promo-nome" placeholder="Nome da Promoção">
    <input type="number" id="promo-preco" placeholder="Preço de Oferta (R$)">
    <div class="upload-box" onclick="document.getElementById('file-promo').click()">
        <i class="fa-solid fa-percent"></i> FOTO DA PROMOÇÃO
        <input type="file" id="file-promo" style="display:none" onchange="uploadImg(this, 'url-promo', 'pre-promo')">
        <img id="pre-promo" class="img-preview">
    </div>
    <div id="status-promo" class="status-up">SUBINDO...</div>
    <input type="hidden" id="url-promo">
    <button class="btn-lancar" style="background:#fbff00; color:#000;" onclick="salvarItem('promocoes_oficina', 'promo')">ATIVAR PROMOÇÃO</button>
</div>

<div class="box">
    <h2><i class="fa-solid fa-list"></i> Itens no Ar</h2>
    <div id="lista-geral"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
        authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
        projectId: "oficina-de-skate-9c49b",
        storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
        messagingSenderId: "905657745716",
        appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const IMG_KEY = 'a499de8c197f35e80312d4fa507c3b29';

    async function uploadImg(input, urlId, preId) {
        const file = input.files[0];
        const status = input.parentElement.nextElementSibling;
        const preview = document.getElementById(preId);
        status.style.display = 'block';
        const formData = new FormData();
        formData.append('image', file);
        try {
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMG_KEY}`, { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById(urlId).value = data.data.url;
            preview.src = data.data.url;
            preview.style.display = 'block';
            status.style.display = 'none';
        } catch(e) { alert("Erro na imagem!"); status.style.display = 'none'; }
    }

    function salvarItem(colecao, prefixo) {
        const dados = {
            nome: document.getElementById(`${prefixo}-nome`).value,
            preco: parseFloat(document.getElementById(`${prefixo}-preco`).value),
            img: document.getElementById(`url-${prefixo}`).value
        };
        if(prefixo === 'prod') dados.cat = document.getElementById('prod-cat').value;
        if(!dados.img || !dados.nome) return alert("Preencha tudo e suba a foto!");
        db.collection(colecao).add(dados).then(() => { alert("Sucesso!"); location.reload(); });
    }

    function salvarConfig(campo, inputId) {
        const valor = document.getElementById(inputId).value;
        db.collection("config").doc("site_data").set({ [campo]: valor }, { merge: true })
        .then(() => alert("Atualizado!"));
    }

    db.collection("config").doc("site_data").onSnapshot(doc => {
        if(doc.exists) {
            document.getElementById('cfg-video').value = doc.data().video_url || '';
            document.getElementById('cfg-missao').value = doc.data().missao || '';
        }
    });

    function carregar(col) {
        db.collection(col).onSnapshot(snap => {
            snap.forEach(doc => {
                const p = doc.data();
                document.getElementById('lista-geral').innerHTML += `
                <div class="item-admin">
                    <img src="${p.img}">
                    <div style="font-size:0.6rem;">${p.nome}</div>
                    <button class="btn-del" onclick="excluir('${col}','${doc.id}')"><i class="fa-solid fa-trash"></i></button>
                </div>`;
            });
        });
    }
    carregar('produtos_oficina'); carregar('promocoes_oficina');
    function excluir(col, id) { if(confirm("Apagar?")) db.collection(col).doc(id).delete().then(() => location.reload()); }
</script>
</body>
</html>
