<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAINEL OFICINA - ADMIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; padding: 15px; }
        
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #login-screen input { width:200px; text-align:center; margin-bottom:15px; font-size:1.5rem; background:#111; border:2px solid #ff0000; color:#fff; padding:10px; border-radius:5px; }
        
        #admin-content { display:none; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 3px solid #ff0000; padding-bottom: 10px; }
        h1 { font-family: 'Bebas Neue'; color: #ff0000; font-size: 2rem; }
        
        .card-admin { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        h2 { font-family: 'Bebas Neue'; color: #fbff00; font-size: 1.4rem; margin-bottom: 10px; }

        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 10px; }
        .btn-acao { background: #ff0000; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        
        /* ESTILO UPLOAD */
        .upload-area { border: 2px dashed #444; padding: 15px; text-align: center; margin-bottom: 10px; border-radius: 5px; cursor: pointer; }
        .upload-area:hover { border-color: #fbff00; }
        #preview-img { max-width: 100px; display: none; margin: 10px auto; border-radius: 5px; }

        .item-lista { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; margin-bottom: 5px; border-radius: 5px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="margin-bottom: 20px;">OFICINA LOGIN</h1>
        <input type="password" id="pass-input" placeholder="SENHA">
        <button class="btn-acao" style="width:200px;" onclick="checkPass()">ENTRAR</button>
    </div>

    <div id="admin-content">
        <div class="header-admin">
            <h1>PAINEL DE CONTROLE</h1>
            <button onclick="location.reload()" style="background:#444; color:#fff; border:none; padding:5px 10px; border-radius:5px;">SAIR</button>
        </div>

        <div class="card-admin">
            <h2 id="form-title">LANÇAR PRODUTO / PROMOÇÃO</h2>
            <input type="hidden" id="edit-id">
            <input type="text" id="nome-p" placeholder="Nome do Produto">
            <input type="number" id="preco-p" placeholder="Preço (R$)">
            
            <div class="upload-area" onclick="document.getElementById('file-input').click()">
                <i class="fa-solid fa-cloud-arrow-up"></i> SELECIONAR IMAGEM
                <input type="file" id="file-input" style="display:none" onchange="uploadImagem(this)">
            </div>
            <img id="preview-img">
            <input type="hidden" id="img-url"> <select id="cat-p">
                <option value="SHAPES">SHAPES</option>
                <option value="TRUCKS">TRUCKS</option>
                <option value="RODAS">RODAS</option>
                <option value="ROLAMENTOS">ROLAMENTOS</option>
                <option value="ACESSÓRIOS">ACESSÓRIOS</option>
                <option value="TÊNIS">TÊNIS</option>
                <option value="PROMOÇÕES">PROMOÇÕES</option>
            </select>
            <button class="btn-acao" id="btn-principal" onclick="salvarProduto()">SALVAR NO ESTOQUE</button>
        </div>

        <div class="card-admin">
            <h2>LANÇAR VÍDEOS (YouTube)</h2>
            <input type="text" id="video-url" placeholder="Link do Vídeo (ex: https://youtube.com/...)">
            <button class="btn-acao" style="background:#fbff00; color:#000;" onclick="salvarVideo()">PUBLICAR VÍDEO</button>
            <div id="lista-videos" style="margin-top:10px"></div>
        </div>

        <div class="card-admin">
            <h2>ESTOQUE ATUAL</h2>
            <div id="lista-estoque"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const IMGBB_API_KEY = "a499de8c197f35e80312d4fa507c3b29";

        function checkPass() {
            if(document.getElementById('pass-input').value === "2203") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                carregarEstoque();
                carregarVideos();
            } else { alert("Senha Errada!"); }
        }

        // FUNÇÃO DE UPLOAD DIRETO PARA IMGBB
        async function uploadImagem(input) {
            const file = input.files[0];
            if(!file) return;
            
            const formData = new FormData();
            formData.append("image", file);

            alert("Subindo imagem para o ImgBB... aguarde.");
            
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: "POST",
                body: formData
            });

            const data = await response.json();
            if(data.success) {
                document.getElementById('img-url').value = data.data.url;
                const preview = document.getElementById('preview-img');
                preview.src = data.data.url;
                preview.style.display = "block";
                alert("Imagem pronta!");
            } else {
                alert("Erro no upload!");
            }
        }

        function salvarProduto() {
            const id = document.getElementById('edit-id').value;
            const dados = {
                nome: document.getElementById('nome-p').value,
                preco: parseFloat(document.getElementById('preco-p').value),
                img: document.getElementById('img-url').value,
                cat: document.getElementById('cat-p').value
            };

            if(!dados.img) return alert("Selecione uma imagem primeiro!");

            if(id) {
                db.collection("produtos_oficina").doc(id).update(dados).then(() => { alert("Editado!"); location.reload(); });
            } else {
                db.collection("produtos_oficina").add(dados).then(() => { alert("Lançado!"); location.reload(); });
            }
        }

        function salvarVideo() {
            const url = document.getElementById('video-url').value;
            if(!url) return alert("Cole o link do vídeo!");
            db.collection("videos_oficina").add({ url, data: new Date() })
            .then(() => { alert("Vídeo Lançado!"); location.reload(); });
        }

        function carregarVideos() {
            db.collection("videos_oficina").onSnapshot(snap => {
                const lista = document.getElementById('lista-videos');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    lista.innerHTML += `<div class="item-lista"><span>${doc.data().url}</span><button onclick="deletar('${doc.id}', 'videos_oficina')">❌</button></div>`;
                });
            });
        }

        function carregarEstoque() {
            db.collection("produtos_oficina").onSnapshot(snap => {
                const lista = document.getElementById('lista-estoque');
                lista.innerHTML = "";
                snap.forEach(doc => {
                    const p = doc.data();
                    lista.innerHTML += `
                        <div class="item-lista">
                            <span>${p.nome} - R$ ${p.preco}</span>
                            <div>
                                <button onclick="prepararEdicao('${doc.id}', '${p.nome}', ${p.preco}, '${p.img}', '${p.cat}')">✏️</button>
                                <button onclick="deletar('${doc.id}', 'produtos_oficina')">❌</button>
                            </div>
                        </div>`;
                });
            });
        }

        function prepararEdicao(id, nome, preco, img, cat) {
            document.getElementById('edit-id').value = id;
            document.getElementById('nome-p').value = nome;
            document.getElementById('preco-p').value = preco;
            document.getElementById('img-url').value = img;
            document.getElementById('cat-p').value = cat;
            document.getElementById('preview-img').src = img;
            document.getElementById('preview-img').style.display = "block";
            window.scrollTo(0,0);
        }

        function deletar(id, col) {
            if(confirm("Apagar?")) db.collection(col).doc(id).delete();
        }
    </script>
</body>
</html>
