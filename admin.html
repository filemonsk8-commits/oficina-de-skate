<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICINA ADMIN - EDUARDO</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; padding: 15px; }
        #login-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        #login-screen input { width:200px; text-align:center; margin-bottom:15px; font-size:1.5rem; background:#111; border:2px solid #ff0000; color:#fff; padding:10px; border-radius:5px; }
        #admin-content { display:none; }
        .header-admin { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 3px solid #ff0000; padding-bottom: 10px; }
        h1 { font-family: 'Bebas Neue'; color: #ff0000; font-size: 2rem; }
        .card-admin { background: #111; border: 1px solid #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        h2 { font-family: 'Bebas Neue'; color: #fbff00; font-size: 1.4rem; margin-bottom: 10px; }
        input, select, textarea { width: 100%; padding: 12px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 10px; font-family: sans-serif; }
        .btn-acao { background: #ff0000; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 5px; }
        .upload-area { border: 2px dashed #444; padding: 15px; text-align: center; margin-bottom: 10px; border-radius: 5px; cursor: pointer; color: #888; }
        #preview-img { max-width: 80px; display: none; margin: 10px auto; border-radius: 5px; border: 1px solid #ff0000; }
        
        .item-lista { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 12px; margin-bottom: 8px; border-radius: 5px; border-left: 4px solid #ff0000; }
        .btn-edit { color: #007bff; background: none; border: none; font-size: 1.2rem; cursor: pointer; margin-right: 15px; }
        .btn-del { color: #ff0000; background: none; border: none; font-size: 1.2rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="margin-bottom: 20px;">OFICINA LOGIN</h1>
        <input type="password" id="pass-input" placeholder="SENHA">
        <button class="btn-acao" style="width:200px;" onclick="checkPass()">ENTRAR</button>
    </div>

    <div id="admin-content">
        <div class="header-admin">
            <h1>PAINEL DE CONTROLE</h1>
            <button onclick="location.reload()" style="background:#444; color:#fff; border:none; padding:8px 15px; border-radius:5px;">SAIR</button>
        </div>

        <div class="card-admin">
            <h2 id="form-title">LANÇAR NOVO ITEM</h2>
            <form id="form-produto" onsubmit="event.preventDefault(); salvarProduto();">
                <input type="hidden" id="edit-id">
                <input type="text" id="nome-p" placeholder="Nome do Produto">
                <input type="number" id="preco-p" placeholder="Preço (R$)" step="0.01">
                
                <div class="upload-area" onclick="document.getElementById('file-input').click()">
                    <i class="fa-solid fa-camera"></i> SELECIONAR FOTO (ImgBB)
                </div>
                <input type="file" id="file-input" style="display:none" onchange="uploadImagem(this)">
                <center><img id="preview-img"></center>
                <input type="hidden" id="img-url"> 

                <select id="cat-p">
                    <option value="SHAPES">SHAPES</option>
                    <option value="TRUCKS">TRUCKS</option>
                    <option value="RODAS">RODAS</option>
                    <option value="ROLAMENTOS">ROLAMENTOS</option>
                    <option value="ACESSÓRIOS">ACESSÓRIOS</option>
                    <option value="TÊNIS">TÊNIS</option>
                    <option value="PROMOÇÕES">🔥 PROMOÇÕES</option>
                </select>
                <button type="submit" class="btn-acao" id="btn-principal">SALVAR NO SITE</button>
            </form>
        </div>

        <div class="card-admin">
            <h2>ITENS LANÇADOS</h2>
            <div id="lista-geral"></div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const IMGBB_KEY = "a499de8c197f35e80312d4fa507c3b29";

        function checkPass() {
            if(document.getElementById('pass-input').value === "2203") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('admin-content').style.display = 'block';
                carregarEstoque();
            } else { alert("Senha incorreta!"); }
        }

        async function uploadImagem(input) {
            const file = input.files[0];
            if(!file) return;
            const formData = new FormData();
            formData.append("image", file);
            alert("Enviando foto...");
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: "POST", body: formData });
                const data = await res.json();
                if(data.success) {
                    document.getElementById('img-url').value = data.data.url;
                    document.getElementById('preview-img').src = data.data.url;
                    document.getElementById('preview-img').style.display = "block";
                    alert("Foto carregada com sucesso!");
                }
            } catch(e) { alert("Erro no upload!"); }
        }

        function salvarProduto() {
            const id = document.getElementById('edit-id').value;
            const cat = document.getElementById('cat-p').value;
            const colecao = (cat === "PROMOÇÕES") ? "promocoes_oficina" : "produtos_oficina";
            
            const dados = {
                nome: document.getElementById('nome-p').value,
                preco: parseFloat(document.getElementById('preco-p').value),
                img: document.getElementById('img-url').value,
                cat: cat
            };

            if(!dados.nome || !dados.img) return alert("Preencha o nome e carregue a foto!");

            if(id) {
                db.collection(colecao).doc(id).update(dados).then(() => {
                    alert("Produto Atualizado!");
                    limparForm();
                });
            } else {
                db.collection(colecao).add(dados).then(() => {
                    alert("Lançado com Sucesso!");
                    limparForm();
                });
            }
        }

        function carregarEstoque() {
            // Produtos Normais
            db.collection("produtos_oficina").onSnapshot(snap => {
                atualizarLista(snap, "produtos_oficina");
            });
            // Promoções
            db.collection("promocoes_oficina").onSnapshot(snap => {
                atualizarLista(snap, "promocoes_oficina", true);
            });
        }

        function atualizarLista(snap, col, isPromo = false) {
            snap.docChanges().forEach(change => {
                const p = change.doc.data();
                const lista = document.getElementById('lista-geral');
                
                if (change.type === "added") {
                    const div = document.createElement('div');
                    div.className = 'item-lista';
                    div.id = change.doc.id;
                    div.innerHTML = `
                        <span>${isPromo ? '🔥' : ''} ${p.nome}</span>
                        <div>
                            <button class="btn-edit" onclick="editar('${change.doc.id}', '${p.nome}', ${p.preco}, '${p.img}', '${p.cat}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-del" onclick="deletar('${change.doc.id}', '${col}')"><i class="fa-solid fa-trash"></i></button>
                        </div>`;
                    lista.appendChild(div);
                }
                if (change.type === "modified") {
                    const el = document.getElementById(change.doc.id);
                    if(el) el.querySelector('span').innerText = (isPromo ? '🔥 ' : '') + p.nome;
                }
                if (change.type === "removed") {
                    const el = document.getElementById(change.doc.id);
                    if(el) el.remove();
                }
            });
        }

        function editar(id, nome, preco, img, cat) {
            document.getElementById('edit-id').value = id;
            document.getElementById('nome-p').value = nome;
            document.getElementById('preco-p').value = preco;
            document.getElementById('img-url').value = img;
            document.getElementById('preview-img').src = img;
            document.getElementById('preview-img').style.display = "block";
            document.getElementById('cat-p').value = cat;
            document.getElementById('form-title').innerText = "EDITANDO ITEM";
            window.scrollTo(0,0);
        }

        function deletar(id, col) {
            if(confirm("Deseja apagar este item?")) {
                db.collection(col).doc(id).delete();
            }
        }

        function limparForm() {
            document.getElementById('edit-id').value = "";
            document.getElementById('nome-p').value = "";
            document.getElementById('preco-p').value = "";
            document.getElementById('img-url').value = "";
            document.getElementById('preview-img').style.display = "none";
            document.getElementById('form-title').innerText = "LANÇAR NOVO ITEM";
        }
    </script>
</body>
</html>
