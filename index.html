<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Skate - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            color: #fff; 
            font-family: 'Archivo Black', sans-serif; 
            text-transform: uppercase; 
            padding-bottom: 120px; 
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.pexels.com/photos/1018484/pexels-photo-1018484.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1');
            background-size: cover; background-position: center; background-attachment: fixed;
        }
        
        header { border-bottom: 8px solid #ff0000; padding: 15px 10px; text-align: center; background: rgba(0,0,0,0.95); }
        .logo-img { max-height: 180px; width: auto; display: block; margin: 0 auto; filter: drop-shadow(2px 2px 10px rgba(0,0,0,0.8)); }

        .page { display: none; padding: 15px; animation: fadeIn 0.3s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .filters { display: flex; gap: 8px; overflow-x: auto; padding: 15px; background: rgba(0,0,0,0.9); position: sticky; top: 0; z-index: 900; border-bottom: 2px solid #333; scrollbar-width: none; }
        .filter-btn { background: #111; color: #fff; border: 2px solid #fff; padding: 10px 15px; font-size: 0.6rem; flex-shrink: 0; cursor: pointer; font-family: 'Archivo Black'; transition: 0.3s; }
        .filter-btn.active { background: #fbff00; color: #000; border-color: #fbff00; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { border: 2px solid #fff; background: rgba(10,10,10,0.95); position: relative; display: flex; flex-direction: column; overflow: hidden; }
        .card-img { width: 100%; height: 140px; object-fit: cover; border-bottom: 2px solid #fff; cursor: zoom-in; }
        .card-info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; }
        .price-tag { background: #fff; color: #000; display: inline-block; padding: 3px 6px; margin-top: 5px; font-size: 0.85rem; width: fit-content; }
        
        .btn-add { width: 100%; background: #ff0000; color: #fff; border: none; padding: 12px; margin-top: 8px; font-family: 'Archivo Black'; cursor: pointer; font-size: 0.7rem; }

        #cart-sidebar { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; padding: 20px; 
            background: #000; border-left: 10px solid #ff0000; overflow-y: auto; 
        }
        .cart-open { right: 0 !important; }
        #cart-list { display: flex; gap: 10px; overflow-x: auto; padding: 20px 0; }
        .cart-item { flex: 0 0 165px; border: 2px solid #fff; padding: 10px; background: #111; text-align: center; }

        .float-btn { position: fixed; bottom: 25px; border-radius: 50%; border: 4px solid #fff; z-index: 1500; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(255,0,0,0.5); }
        #cart-trigger { right: 20px; background: #ff0000; color: #fff; width: 75px; height: 75px; font-size: 1.8rem; }
        #admin-trigger { left: 20px; background: #222; color: #fff; width: 55px; height: 55px; font-size: 1.2rem; }
        .badge { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; padding: 4px 8px; border-radius: 50%; font-size: 0.8rem; border: 2px solid #ff0000; }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpeg" alt="Oficina de Skate" class="logo-img">
    </header>

    <div id="zoom-modal" onclick="this.style.display='none'">
        <img id="zoom-img" src="">
    </div>

    <section id="page-loja" class="page active">
        <div class="filters" id="cat-filters">
            <button class="filter-btn active" onclick="filtrar('TUDO', this)">TUDO</button>
            <button class="filter-btn" onclick="filtrar('SHAPES', this)">SHAPES</button>
            <button class="filter-btn" onclick="filtrar('RODAS', this)">RODAS</button>
            <button class="filter-btn" onclick="filtrar('CAMISETA', this)">CAMISETAS</button>
            <button class="filter-btn" onclick="filtrar('CAL&Ccedil;A', this)">CAL&Ccedil;AS</button>
            <button class="filter-btn" onclick="filtrar('BERMUDA', this)">BERMUDAS</button>
            <button class="filter-btn" onclick="filtrar('T&Ecirc;NIS', this)">T&Ecirc;NIS</button>
            <button class="filter-btn" onclick="filtrar('ACESS&Oacute;RIOS', this)">ACESS&Oacute;RIOS</button>
        </div>
        <div class="grid" id="vitrine"></div>
    </section>

    <div id="cart-sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #fff; padding-bottom: 10px;">
            <h2 style="font-family:'Bebas Neue'; font-size:2.5rem; color:#fff;">MEU DROP</h2>
            <div style="color:#000; background: #fbff00; padding: 8px 15px; cursor:pointer; font-size:0.7rem;" onclick="toggleCart()">FECHAR</div>
        </div>
        
        <p style="color: #fbff00; font-size: 0.85rem; margin-top: 15px; text-align: center; border: 1px dashed #fbff00; padding: 10px;">
            SEU DROP ESTÁ QUASE PRONTO! SÓ OS FORTES AVANÇAM.
        </p>

        <div id="cart-list"></div>
        
        <div style="margin-top:30px; background: rgba(30,30,30,0.9); padding: 20px; border: 2px solid #fbff00;">
            <p style="font-size:1.2rem; color: #fff;">SUBTOTAL:</p>
            <p style="font-size:2.5rem; color: #fbff00;">R$ <span id="total-val">0.00</span></p>
            <button onclick="enviarWhatsApp()" style="background:#25D366; color:#000; width:100%; padding:20px; border:none; font-family:'Archivo Black'; margin-top:15px; font-size:1.1rem; cursor:pointer;">FECHAR PEDIDO</button>
        </div>
    </div>

    <div id="admin-trigger" class="float-btn" onclick="acessoAdmin()"><i class="fa-solid fa-gear"></i></div>
    <div id="cart-trigger" class="float-btn" onclick="toggleCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count" class="badge">0</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let produtos = [], carrinho = [], filtroAtual = 'TUDO';

        function carregarProdutosDaNuvem() {
            db.collection("produtos_oficina").orderBy("dataCriacao", "desc").onSnapshot((snapshot) => {
                produtos = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderizarVitrine();
            });
        }

        function renderizarVitrine() {
            const v = document.getElementById('vitrine');
            const lista = filtroAtual === 'TUDO' ? produtos : produtos.filter(p => p.cat === filtroAtual);
            v.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img || 'https://via.placeholder.com/160'}" class="card-img" onclick="document.getElementById('zoom-img').src=this.src; document.getElementById('zoom-modal').style.display='flex'">
                    <div class="card-info">
                        <div style="font-size:0.7rem; margin:5px 0;">${p.nome}</div>
                        <div class="price-tag">R$ ${p.preco.toFixed(2)}</div>
                        <button class="btn-add" onclick="addToCart('${p.id}')">ADICIONAR</button>
                    </div>
                </div>`).join('');
        }

        function filtrar(cat, btn) {
            filtroAtual = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizarVitrine();
        }

        function addToCart(id) { 
            const prod = produtos.find(p => p.id === id);
            if(prod) { 
                carrinho.push(prod); 
                atualizarInterfaceCarrinho(); 
            }
        }

        function atualizarInterfaceCarrinho() {
            document.getElementById('cart-count').innerText = carrinho.length;
            const l = document.getElementById('cart-list'), t = document.getElementById('total-val');
            let tot = 0;
            l.innerHTML = carrinho.map((it, idx) => {
                tot += it.preco;
                return `<div class="cart-item">
                    <img src="${it.img}" style="width:100%; height:85px; object-fit:cover;">
                    <button onclick="carrinho.splice(${idx},1); atualizarInterfaceCarrinho()" style="background:#ff0000; border:none; color:#fff; padding:5px; width:100%; cursor:pointer;">REMOVER</button>
                </div>`;
            }).join('');
            t.innerText = tot.toFixed(2);
        }

        function enviarWhatsApp() {
            if (carrinho.length === 0) return alert("CARRINHO VAZIO!");
            const nomeCliente = prompt("QUAL O SEU NOME?");
            if (!nomeCliente) return;

            // Mensagem de confirmação solicitada pelo Eduardo
            alert("MANOBRA CONCLUÍDA! ESTAMOS TE LEVANDO PARA O WHATSAPP PARA FINALIZAR O PEDIDO.");

            let msg = `*PEDIDO - OFICINA DE SKATE*\n*CLIENTE:* ${nomeCliente.toUpperCase()}\n\n`;
            carrinho.forEach(i => msg += `• ${i.nome} - R$ ${i.preco.toFixed(2)}\n`);
            msg += `\n*TOTAL: R$ ${document.getElementById('total-val').innerText}*`;
            window.open(`https://wa.me/5562997021174?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function acessoAdmin() { if(prompt("SENHA:") === '2203') window.location.href = "admin.html"; }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('cart-open'); }
        
        carregarProdutosDaNuvem();
    </script>
</body>
</html>
