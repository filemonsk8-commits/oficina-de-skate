<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Skate - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; overflow-x: hidden; }
        
        /* HEADER - LOGO RESTAURADA */
        header { 
            background: #000; padding: 20px 15px; border-bottom: 5px solid #ff0000; 
            position: sticky; top: 0; z-index: 900; display: flex; justify-content: space-between; align-items: center; 
        }
        .logo-container { flex-grow: 1; text-align: center; }
        .logo-txt { font-family: 'Bebas Neue'; font-size: 2.8rem; color: #ff0000; letter-spacing: 3px; text-shadow: 2px 2px #000; }
        
        .icon-top { font-size: 1.6rem; cursor: pointer; color: #fff; position: relative; width: 40px; }
        .cart-badge { 
            position: absolute; top: -5px; right: -5px; background: #fbff00; color: #000; 
            font-size: 0.75rem; padding: 2px 6px; border-radius: 50%; font-weight: bold; border: 2px solid #000;
        }

        /* MENU LATERAL */
        #side-menu { position: fixed; left: -300px; top: 0; width: 300px; height: 100%; background: #111; transition: 0.4s; z-index: 1001; border-right: 4px solid #ff0000; padding: 20px; overflow-y: auto; }
        #side-menu.active { left: 0; }
        .video-box { width: 100%; border: 2px solid #fbff00; margin: 20px 0; border-radius: 5px; overflow: hidden; background: #000; box-shadow: 0 0 10px #fbff00; }
        
        /* FILTROS COM TUDO (INCLUSIVE HOOKAH THUG) */
        .filtros { display: flex; overflow-x: auto; padding: 15px; gap: 12px; background: #111; border-bottom: 1px solid #333; }
        .filtros::-webkit-scrollbar { display: none; }
        .btn-filter { background: #000; color: #fff; border: 2px solid #ff0000; padding: 10px 20px; cursor: pointer; font-family: 'Bebas Neue'; white-space: nowrap; font-size: 1.1rem; }
        .btn-filter.active { background: #ff0000; color: #fff; }
        
        /* VITRINE E CARDS */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 10px; text-align: center; border-radius: 10px; transition: 0.3s; }
        .card:hover { border-color: #ff0000; transform: translateY(-5px); }
        .img-container { height: 150px; display: flex; align-items: center; justify-content: center; background: #fff; border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
        .card img { max-width: 90%; max-height: 90%; transition: 0.5s; cursor: zoom-in; }
        .card img:hover { transform: scale(1.6); }
        .price { color: #fbff00; font-size: 1.5rem; margin: 10px 0; font-family: 'Bebas Neue'; }
        .btn-add { width: 100%; background: #ff0000; color: #fff; border: none; padding: 12px; cursor: pointer; font-family: 'Archivo Black'; font-size: 0.65rem; border-radius: 5px; text-transform: uppercase; }

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 950; }
    </style>
</head>
<body>

    <div id="overlay" onclick="fecharMenus()"></div>

    <audio id="click-sound" src="click.mp3"></audio>

    <header>
        <div class="icon-top" onclick="toggleMenu()"><i class="fa-solid fa-bars-staggered"></i></div>
        <div class="logo-container">
            <h1 class="logo-txt">OFICINA</h1>
        </div>
        <div class="icon-top" onclick="abrirCarrinho()">
            <i class="fa-solid fa-cart-shopping"></i>
            <span class="cart-badge" id="cart-count">0</span>
        </div>
    </header>

    <nav id="side-menu">
        <h2 style="font-family:'Bebas Neue'; color:#ff0000; font-size: 2rem;">VIBE DA OFICINA</h2>
        <div class="video-box" id="area-video-drop"></div>
        <p style="font-size:0.7rem; color:#888; text-transform: none;">Confira os drops e sessões direto da nossa curadoria.</p>
        <hr style="border:0; border-top:1px solid #333; margin:20px 0;">
        <a href="admin.html" style="color:#333; text-decoration:none; font-size:0.7rem;"><i class="fa-solid fa-lock"></i> PAINEL ADMIN</a>
    </nav>

    <div class="filtros">
        <button class="btn-filter active" onclick="filtrar('TODOS', this)">TODOS</button>
        <button class="btn-filter" onclick="filtrar('SHAPES', this)">SHAPES</button>
        <button class="btn-filter" onclick="filtrar('RODAS', this)">RODAS</button>
        <button class="btn-filter" onclick="filtrar('ROLAMENTOS', this)">ROLAMENTOS</button>
        <button class="btn-filter" onclick="filtrar('TRUCK', this)">TRUCKS</button>
        <button class="btn-filter" onclick="filtrar('TÊNIS', this)">TÊNIS</button>
        <button class="btn-filter" onclick="filtrar('CALÇAS', this)">CALÇAS</button>
        <button class="btn-filter" onclick="filtrar('HOOKAH THUG', this)">HOOKAH THUG</button>
        <button class="btn-filter" onclick="filtrar('PROMOÇÕES', this)" style="color:#fbff00; border-color:#fbff00;">PROMOÇÕES 🔥</button>
    </div>

    <div class="vitrine" id="vitrine"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let carrinho = [];

        function playClick() {
            const sfx = document.getElementById('click-sound');
            sfx.currentTime = 0;
            sfx.play().catch(e => console.log("Som bloqueado pelo navegador"));
        }

        function toggleMenu() {
            playClick();
            document.getElementById('side-menu').classList.toggle('active');
            document.getElementById('overlay').style.display = 'block';
        }

        function fecharMenus() {
            document.getElementById('side-menu').classList.remove('active');
            document.getElementById('overlay').style.display = 'none';
        }

        function adicionarAoCarrinho(nome, preco) {
            playClick();
            carrinho.push({ nome, preco });
            document.getElementById('cart-count').innerText = carrinho.length;
            
            // Feedback visual no botão
            event.target.innerText = "ADICIONADO!";
            event.target.style.background = "#fbff00";
            event.target.style.color = "#000";
            setTimeout(() => {
                event.target.innerText = "ADD CARRINHO";
                event.target.style.background = "#ff0000";
                event.target.style.color = "#fff";
            }, 800);
        }

        function abrirCarrinho() {
            playClick();
            if (carrinho.length === 0) return alert("Carrinho vazio, escolhe as peças!");

            const nome = prompt("Qual seu nome para o atendimento?");
            if (!nome) return;

            let msg = `Salve Oficina! Sou o *${nome}*. Curti essas peças:%0A%0A`;
            let total = 0;
            carrinho.forEach(p => {
                msg += `- ${p.nome} (R$ ${p.preco.toFixed(2)})%0A`;
                total += p.preco;
            });
            msg += `%0A*TOTAL: R$ ${total.toFixed(2)}* %0A%0AComo combinamos a entrega?`;

            window.open(`https://wa.me/5562997021174?text=${msg}`, '_blank');
        }

        function filtrar(cat, btn) {
            playClick();
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            carregarVitrine(cat);
        }

        db.collection("config").doc("video_drop").onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('area-video-drop').innerHTML = `<video width="100%" autoplay muted loop playsinline><source src="${doc.data().url}" type="video/mp4"></video>`;
            }
        });

        function carregarVitrine(cat = 'TODOS') {
            const v = document.getElementById('vitrine');
            v.innerHTML = '...';
            let ref = db.collection("produtos_oficina");
            if(cat !== 'TODOS') ref = ref.where("cat", "==", cat);

            ref.onSnapshot(snap => {
                v.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    v.innerHTML += `
                        <div class="card">
                            <div class="img-container"><img src="${p.img}"></div>
                            <h3 style="font-size:0.75rem; margin:10px 0; height:35px;">${p.nome}</h3>
                            <p class="price">R$ ${p.preco.toFixed(2)}</p>
                            <button class="btn-add" onclick="adicionarAoCarrinho('${p.nome}', ${p.preco})">ADD CARRINHO</button>
                        </div>`;
                });
            });
        }
        carregarVitrine();
    </script>
</body>
</html>
