<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Skate - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            color: #fff; font-family: 'Archivo Black', sans-serif; text-transform: uppercase; padding-bottom: 120px; 
            background-color: #000;
            background-image: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://images.pexels.com/photos/1018484/pexels-photo-1018484.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1');
            background-size: cover; background-position: center; background-attachment: fixed;
        }

        /* TOPO MAIS ESTREITO (SLIM) */
        header { 
            border-bottom: 6px solid #ff0000; 
            padding: 15px 10px; /* Reduzi o padding para estreitar */
            background: rgba(0,0,0,0.95); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 15px; 
            flex-wrap: nowrap; /* Impede quebra para manter estreito */
        }

        .header-text { 
            font-family: 'Bebas Neue', cursive; 
            font-size: 3.5rem; /* Ajustado para o novo topo */
            color: #fff; 
            letter-spacing: 2px; 
            line-height: 1; 
            text-shadow: 2px 2px 0px #ff0000;
        }

        .logo-img { 
            max-height: 100px; /* Reduzi a altura para o topo ficar estreito */
            width: auto; 
            display: block; 
            filter: drop-shadow(0px 0px 8px rgba(255, 0, 0, 0.4)); 
        }

        /* BARRA DE FILTROS COM NOVAS CATEGORIAS */
        .filters { 
            display: flex; gap: 8px; overflow-x: auto; padding: 12px; 
            background: rgba(0,0,0,0.9); position: sticky; top: 0; 
            z-index: 900; border-bottom: 2px solid #333; 
            scrollbar-width: none; /* Esconde scroll no Firefox */
        }
        .filters::-webkit-scrollbar { display: none; } /* Esconde scroll no Chrome/Safari */

        .filter-btn { 
            background: #111; color: #fff; border: 2px solid #fff; 
            padding: 8px 16px; font-size: 0.65rem; flex-shrink: 0; 
            cursor: pointer; font-family: 'Archivo Black'; 
        }
        .filter-btn.active { background: #fbff00; color: #000; border-color: #fbff00; }

        /* GRID E VITRINE */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 15px; }
        .card { border: 2px solid #fff; background: rgba(10,10,10,0.95); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .card-img { width: 100%; height: 150px; object-fit: cover; border-bottom: 2px solid #fff; cursor: zoom-in; }
        .price-tag { background: #fff; color: #000; padding: 4px 8px; margin-top: 5px; font-size: 0.85rem; width: fit-content; }
        .btn-add { width: 100%; background: #ff0000; color: #fff; border: none; padding: 12px; margin-top: auto; font-family: 'Archivo Black'; cursor: pointer; font-size: 0.7rem; }

        /* ZOOM MODAL */
        #zoom-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; }
        #zoom-img { max-width: 95%; max-height: 85%; border: 3px solid #fff; }

        /* CARRINHO */
        #cart-sidebar { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; transition: 0.4s; z-index: 2000; padding: 20px; background: #000; border-left: 10px solid #ff0000; overflow-y: auto; }
        .cart-open { right: 0 !important; }

        /* BOTÕES FLUTUANTES */
        .float-btn { position: fixed; bottom: 25px; border-radius: 50%; border: 4px solid #fff; z-index: 1500; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #cart-trigger { right: 20px; background: #ff0000; color: #fff; width: 70px; height: 70px; font-size: 1.6rem; }
        #admin-trigger { left: 20px; background: #222; color: #fff; width: 50px; height: 50px; font-size: 1.2rem; }
        .badge { position: absolute; top: -5px; right: -5px; background: #fff; color: #000; padding: 4px 8px; border-radius: 50%; font-size: 0.8rem; border: 2px solid #ff0000; }

        @media (max-width: 600px) {
            .header-text { font-size: 2.2rem; }
            .logo-img { max-height: 70px; }
        }
    </style>
</head>
<body>

    <audio id="som-clique" src="click.mpeg" preload="auto"></audio>

    <header>
        <p class="header-text">OFICINA</p>
        <img src="logo.png" alt="Oficina de Skate" class="logo-img">
        <p class="header-text">SKATE</p>
    </header>

    <div id="zoom-modal" onclick="this.style.display='none'">
        <img id="zoom-img" src="">
    </div>

    <div class="filters" id="cat-filters">
        <button class="filter-btn active" onclick="filtrar('TUDO', this)">TUDO</button>
        <button class="filter-btn" onclick="filtrar('SHAPES', this)">SHAPES</button>
        <button class="filter-btn" onclick="filtrar('RODAS', this)">RODAS</button>
        <button class="filter-btn" onclick="filtrar('TRUCK', this)">TRUCK</button>
        <button class="filter-btn" onclick="filtrar('ROLAMENTOS', this)">ROLAMENTOS</button>
        <button class="filter-btn" onclick="filtrar('TÊNIS', this)">TÊNIS</button>
        <button class="filter-btn" onclick="filtrar('BERMUDAS', this)">BERMUDAS</button>
        <button class="filter-btn" onclick="filtrar('CALÇAS', this)">CALÇAS</button>
        <button class="filter-btn" onclick="filtrar('ACESSÓRIOS', this)">ACESSÓRIOS</button>
    </div>

    <div class="grid" id="vitrine"></div>

    <div id="cart-sidebar">
        <h2 style="font-family:'Bebas Neue'; font-size:2.5rem;">MEU DROP</h2>
        <div id="cart-list"></div>
        <div style="margin-top:20px; background: #111; padding: 15px; border: 2px solid #fbff00;">
            <p>TOTAL: R$ <span id="total-val">0.00</span></p>
            <button onclick="enviarWhatsApp()" style="background:#25D366; width:100%; padding:15px; margin-top:10px; font-family:'Archivo Black'; border:none; color:#000; cursor:pointer;">FECHAR PEDIDO</button>
            <button onclick="toggleCart()" style="background:#555; width:100%; padding:10px; margin-top:5px; color:#fff; border:none; cursor:pointer;">VOLTAR</button>
        </div>
    </div>

    <div id="admin-trigger" class="float-btn" onclick="acessoAdmin()">
        <i class="fa-solid fa-gear"></i>
    </div>
    
    <div id="cart-trigger" class="float-btn" onclick="toggleCart()">
        <i class="fa-solid fa-cart-shopping"></i>
        <span id="cart-count" class="badge">0</span>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        let produtos = [], carrinho = [], filtroAtual = 'TUDO';

        function carregarProdutos() {
            db.collection("produtos_oficina").onSnapshot(snap => {
                produtos = snap.docs.map(doc => ({id: doc.id, ...doc.data()}));
                renderizar();
            });
        }

        function renderizar() {
            const v = document.getElementById('vitrine');
            const lista = filtroAtual === 'TUDO' ? produtos : produtos.filter(p => p.cat === filtroAtual);
            v.innerHTML = lista.map(p => `
                <div class="card">
                    <img src="${p.img}" class="card-img" onclick="abrirZoom('${p.img}')">
                    <div style="padding:10px; flex-grow: 1; display: flex; flex-direction: column;">
                        <p style="font-size:0.7rem; min-height: 35px;">${p.nome}</p>
                        <div class="price-tag">R$ ${p.preco.toFixed(2)}</div>
                        <button class="btn-add" onclick="addToCart('${p.id}')">ADICIONAR</button>
                    </div>
                </div>`).join('');
        }

        function abrirZoom(src) {
            document.getElementById('zoom-img').src = src;
            document.getElementById('zoom-modal').style.display = 'flex';
        }

        function addToCart(id) {
            const p = produtos.find(item => item.id === id);
            if(p) {
                const s = document.getElementById('som-clique');
                s.currentTime = 0;
                s.play().catch(e => {});
                carrinho.push(p);
                atualizarCarrinho();
            }
        }

        function atualizarCarrinho() {
            document.getElementById('cart-count').innerText = carrinho.length;
            let tot = 0;
            document.getElementById('cart-list').innerHTML = carrinho.map((it, idx) => {
                tot += it.preco;
                return `<div style="border-bottom:1px solid #333; padding:10px; font-size:0.8rem; display:flex; justify-content:space-between;">
                    <span>${it.nome}</span>
                    <span>R$ ${it.preco.toFixed(2)}</span>
                </div>`;
            }).join('');
            document.getElementById('total-val').innerText = tot.toFixed(2);
        }

        function enviarWhatsApp() {
            if(carrinho.length === 0) return alert("CARRINHO VAZIO!");
            const nome = prompt("QUAL SEU NOME?");
            if(!nome) return;
            let msg = `*PEDIDO OFICINA:* ${nome.toUpperCase()}\n\n`;
            carrinho.forEach(i => msg += `- ${i.nome}\n`);
            msg += `\n*TOTAL: R$ ${document.getElementById('total-val').innerText}*`;
            window.open(`https://wa.me/5562997021174?text=${encodeURIComponent(msg)}`);
        }

        function acessoAdmin() { 
            const senha = prompt("SENHA DO ADMINISTRADOR:");
            if(senha === '2203') { window.location.href = "admin.html"; } 
            else { alert("SENHA INCORRETA!"); }
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('cart-open'); }
        function filtrar(c, b) { 
            filtroAtual = c; 
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            b.classList.add('active');
            renderizar();
        }
        
        carregarProdutos();
    </script>
</body>
</html>
