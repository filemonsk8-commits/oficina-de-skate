<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Skate</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; overflow-x: hidden; }
        header { background: #000; padding: 15px; text-align: center; border-bottom: 5px solid #ff0000; position: sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
        .logo { font-family: 'Bebas Neue'; font-size: 2.5rem; color: #ff0000; flex-grow:1; }
        
        /* MENU LATERAL */
        #side-menu { position: fixed; left: -280px; top: 0; width: 280px; height: 100%; background: #111; transition: 0.4s; z-index: 1000; border-right: 4px solid #ff0000; padding: 20px; overflow-y: auto; }
        #side-menu.active { left: 0; }
        .menu-item { display: block; padding: 15px 0; color: #fff; text-decoration: none; font-family: 'Bebas Neue'; font-size: 1.4rem; border-bottom: 1px solid #222; }
        .video-container { width: 100%; margin: 20px 0; border: 1px solid #fbff00; }
        
        /* VITRINE & ZOOM */
        .filtros { display: flex; overflow-x: auto; padding: 15px; gap: 10px; background: #111; scrollbar-width: none; }
        .btn-filter { background: #000; color: #fff; border: 1px solid #ff0000; padding: 10px 15px; cursor: pointer; font-family: 'Bebas Neue'; }
        .btn-filter.active { background: #ff0000; }
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 10px; text-align: center; border-radius: 5px; }
        .card img { width: 100%; height: 150px; object-fit: contain; transition: 0.5s; cursor: zoom-in; }
        .card img:hover { transform: scale(1.5); }
        .price { color: #fbff00; font-family: 'Bebas Neue'; font-size: 1.5rem; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 950; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>

    <nav id="side-menu">
        <h2 style="font-family:'Bebas Neue'; color:#ff0000;">OFICINA DE SKATE</h2>
        <p style="font-size:0.7rem; color:#888; margin:10px 0;">NOSSA MISSÃO: Passar a visão do skate original, fortalecendo a cena com as melhores peças e o drop sempre atualizado.</p>
        
        <div class="video-container" id="video-drop-area">
            </div>

        <a href="https://wa.me/5562997021174" target="_blank" class="menu-item"><i class="fa-brands fa-whatsapp"></i> LOJA 1 (62) 997021174</a>
        <a href="https://wa.me/5562000000000" target="_blank" class="menu-item"><i class="fa-brands fa-whatsapp"></i> LOJA 2</a>
    </nav>

    <header>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size:1.5rem;"><i class="fa-solid fa-bars"></i></div>
        <div class="logo">OFICINA</div>
    </header>

    <div class="filtros">
        <button class="btn-filter active" onclick="filtrar('TODOS')">TODOS</button>
        <button class="btn-filter" onclick="filtrar('SHAPES')">SHAPES</button>
        <button class="btn-filter" onclick="filtrar('RODAS')">RODAS</button>
        <button class="btn-filter" onclick="filtrar('ROLAMENTOS')">ROLAMENTOS</button>
        <button class="btn-filter" onclick="filtrar('TRUCK')">TRUCKS</button>
        <button class="btn-filter" onclick="filtrar('TÊNIS')">TÊNIS</button>
        <button class="btn-filter" onclick="filtrar('CALÇAS')">CALÇAS</button>
        <button class="btn-filter" onclick="filtrar('PROMOÇÕES')">PROMOÇÕES 🔥</button>
    </div>

    <div class="vitrine" id="vitrine"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        // Configuração Firebase igual à do Admin
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function toggleMenu() {
            document.getElementById('side-menu').classList.toggle('active');
            const o = document.getElementById('overlay');
            o.style.display = o.style.display === 'block' ? 'none' : 'block';
        }

        // Carrega o vídeo do Cloudinary
        db.collection("config").doc("video_drop").onSnapshot(doc => {
            if(doc.exists) {
                document.getElementById('video-drop-area').innerHTML = `
                    <video width="100%" controls autoplay muted loop>
                        <source src="${doc.data().url}" type="video/mp4">
                    </video>`;
            }
        });

        function filtrar(cat) {
            carregarVitrine(cat);
        }

        function carregarVitrine(cat = 'TODOS') {
            const v = document.getElementById('vitrine');
            v.innerHTML = 'Carregando...';
            let ref = db.collection("produtos_oficina");
            if(cat !== 'TODOS') ref = ref.where("cat", "==", cat);

            ref.onSnapshot(snap => {
                v.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    v.innerHTML += `
                        <div class="card">
                            <img src="${p.img}">
                            <h3 style="font-size:0.7rem; margin:10px 0;">${p.nome}</h3>
                            <p class="price">R$ ${p.preco.toFixed(2)}</p>
                            <button onclick="toggleMenu()" style="width:100%; background:red; color:white; border:none; padding:10px; cursor:pointer;">COMPRAR</button>
                        </div>`;
                });
            });
        }
        carregarVitrine();
    </script>
</body>
</html>
