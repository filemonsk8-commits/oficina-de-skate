<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICINA DE SKATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; overflow-x: hidden; }
        
        /* HEADER E ESTILO GERAL */
        header { background: #111; padding: 20px; text-align: center; border-bottom: 4px solid #ff0000; }
        .logo-oficina { font-family: 'Bebas Neue'; font-size: 3.5rem; color: #ff0000; text-shadow: 3px 3px #fbff00; }
        
        .missao-box { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid #333; }
        #missao-texto { font-size: 0.9rem; color: #fbff00; letter-spacing: 1px; }

        /* SEÇÃO DE PROMOÇÕES (DESTAQUE) */
        .promo-container { background: #fbff00; color: #000; padding: 15px; text-align: center; }
        .promo-title { font-family: 'Bebas Neue'; font-size: 2rem; margin-bottom: 10px; }
        .promo-scroll { display: flex; overflow-x: auto; gap: 15px; padding: 10px; }
        .card-promo { min-width: 150px; background: #000; color: #fff; padding: 10px; border-radius: 8px; border: 2px solid #ff0000; }

        /* CATEGORIAS */
        .cat-nav { display: flex; overflow-x: auto; background: #222; padding: 10px; gap: 10px; }
        .cat-btn { background: #ff0000; color: #fff; border: none; padding: 8px 15px; border-radius: 20px; font-family: 'Bebas Neue'; cursor: pointer; white-space: nowrap; }

        /* VITRINE DE PRODUTOS */
        .vitrine { display: grid; grid-template-columns: 1-1fr 1fr; gap: 15px; padding: 15px; }
        @media (min-width: 600px) { .vitrine { grid-template-columns: repeat(4, 1fr); } }
        
        .produto-card { background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; text-align: center; position: relative; }
        .produto-card img { width: 100%; border-radius: 8px; margin-bottom: 10px; height: 150px; object-fit: cover; }
        .produto-nome { font-size: 0.8rem; margin-bottom: 5px; height: 35px; overflow: hidden; }
        .produto-preco { color: #fbff00; font-size: 1.2rem; margin-bottom: 10px; }
        .btn-add { background: #ff0000; color: #fff; border: none; width: 100%; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* CARRINHO */
        #carrinho-fixo { position: fixed; bottom: 20px; right: 20px; background: #fbff00; color: #000; padding: 15px; border-radius: 50px; cursor: pointer; box-shadow: 0 0 15px rgba(251, 255, 0, 0.5); z-index: 100; font-weight: bold; }
        
        /* MODAL DO CARRINHO */
        #modal-cart { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; padding: 20px; }
        .cart-content { background: #111; border: 2px solid #ff0000; padding: 20px; border-radius: 15px; max-width: 500px; margin: auto; max-height: 80vh; overflow-y: auto; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 10px 0; }
        .btn-finalizar { background: #25d366; color: #fff; border: none; width: 100%; padding: 15px; margin-top: 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    </style>
</head>
<body>

<header>
    <h1 class="logo-oficina">OFICINA</h1>
</header>

<div class="missao-box">
    <p id="missao-texto">Carregando missão da Oficina...</p>
</div>

<div id="section-promo" style="display:none;">
    <div class="promo-container">
        <h2 class="promo-title">🔥 PROMOÇÕES DO DIA 🔥</h2>
        <div class="promo-scroll" id="lista-promo"></div>
    </div>
</div>

<nav class="cat-nav">
    <button class="cat-btn" onclick="filtrar('TODOS')">TODOS</button>
    <button class="cat-btn" onclick="filtrar('SHAPES')">SHAPES</button>
    <button class="cat-btn" onclick="filtrar('RODAS')">RODAS</button>
    <button class="cat-btn" onclick="filtrar('ROLAMENTOS')">ROLAMENTOS</button>
    <button class="cat-btn" onclick="filtrar('TÊNIS')">TÊNIS</button>
    <button class="cat-btn" onclick="filtrar('BERMUDAS')">BERMUDAS</button>
    <button class="cat-btn" onclick="filtrar('CALÇAS')">CALÇAS</button>
</nav>

<div class="vitrine" id="vitrine-produtos"></div>

<div id="carrinho-fixo" onclick="abrirCarrinho()">
    <i class="fa-solid fa-cart-shopping"></i> <span id="cart-count">0</span> ITENS
</div>

<div id="modal-cart">
    <div class="cart-content">
        <h2 style="font-family: 'Bebas Neue'; color: #fbff00; margin-bottom: 15px;">SEU DROP</h2>
        <div id="itens-no-carrinho"></div>
        <h3 id="total-carrinho" style="margin-top: 15px; text-align: right; color: #fbff00;">TOTAL: R$ 0,00</h3>
        <button class="btn-finalizar" onclick="enviarPedidoWhatsApp()">FINALIZAR NO WHATSAPP</button>
        <button onclick="fecharCarrinho()" style="background:none; color:#888; border:none; width:100%; margin-top:10px; cursor:pointer;">Continuar Comprando</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
        authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
        projectId: "oficina-de-skate-9c49b",
        storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
        messagingSenderId: "905657745716",
        appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let carrinho = [];

    // --- SINCRONIZAÇÃO DA MISSÃO ---
    db.collection("config").doc("site_data").onSnapshot(doc => {
        if(doc.exists && doc.data().missao) {
            document.getElementById('missao-texto').innerText = doc.data().missao;
        }
    });

    // --- CARREGAR PROMOÇÕES ---
    db.collection("promocoes_oficina").onSnapshot(snap => {
        const lista = document.getElementById('lista-promo');
        const section = document.getElementById('section-promo');
        lista.innerHTML = '';
        if(snap.empty) return section.style.display = 'none';
        
        section.style.display = 'block';
        snap.forEach(doc => {
            const p = doc.data();
            lista.innerHTML += `
                <div class="card-promo">
                    <img src="${p.img}" style="width:100%; border-radius:5px;">
                    <div style="font-size:0.7rem; margin:5px 0;">${p.nome}</div>
                    <div style="color:#fbff00;">R$ ${p.preco.toFixed(2)}</div>
                    <button class="btn-add" style="font-size:0.6rem; padding:5px;" onclick="addCart('${p.nome}', ${p.preco})">ADD</button>
                </div>`;
        });
    });

    // --- CARREGAR PRODUTOS ---
    function carregarProdutos(filtro = 'TODOS') {
        db.collection("produtos_oficina").onSnapshot(snap => {
            const vitrine = document.getElementById('vitrine-produtos');
            vitrine.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                if(filtro === 'TODOS' || p.cat === filtro) {
                    vitrine.innerHTML += `
                        <div class="produto-card">
                            <img src="${p.img}">
                            <div class="produto-nome">${p.nome}</div>
                            <div class="produto-preco">R$ ${p.preco.toFixed(2)}</div>
                            <button class="btn-add" onclick="addCart('${p.nome}', ${p.preco})">ADICIONAR</button>
                        </div>`;
                }
            });
        });
    }

    function filtrar(cat) { carregarProdutos(cat); }
    carregarProdutos();

    // --- LÓGICA DO CARRINHO ---
    function addCart(nome, preco) {
        carrinho.push({ nome, preco });
        document.getElementById('cart-count').innerText = carrinho.length;
        // SFX DE CLICK (Se você tiver o arquivo click.mpeg no Git)
        new Audio('click.mpeg').play().catch(()=>{});
    }

    function abrirCarrinho() {
        const modal = document.getElementById('modal-cart');
        const lista = document.getElementById('itens-no-carrinho');
        const totalTxt = document.getElementById('total-carrinho');
        modal.style.display = 'flex';
        lista.innerHTML = '';
        let total = 0;

        carrinho.forEach((item, index) => {
            total += item.preco;
            lista.innerHTML += `
                <div class="cart-item">
                    <span>${item.nome}</span>
                    <span>R$ ${item.preco.toFixed(2)}</span>
                </div>`;
        });
        totalTxt.innerText = `TOTAL: R$ ${total.toFixed(2)}`;
    }

    function fecharCarrinho() { document.getElementById('modal-cart').style.display = 'none'; }

    // --- FINALIZAÇÃO WHATSAPP ---
    function enviarPedidoWhatsApp() {
        if(carrinho.length === 0) return alert("Escolha algo primeiro!");

        let msg = "*🔥 SALVE, FAMÍLIA! PEDIDO NOVO NA ÁREA! 🔥*\n\n";
        msg += "Estou na vitrine e quero garantir essas peças:\n\n";
        
        let total = 0;
        carrinho.forEach((item, i) => {
            msg += `*${i+1}.* ${item.nome} - R$ ${item.preco.toFixed(2)}\n`;
            total += item.preco;
        });

        msg += `\n*TOTAL:* R$ ${total.toFixed(2)}\n`;
        msg += "\n*🚀 JÁ SEPARA QUE O DROP É MEU!*";

        const meuZap = "5511999999999"; // COLOQUE SEU NÚMERO AQUI
        window.open(`https://wa.me/${meuZap}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
