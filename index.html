<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Admin - Oficina de Skate</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        input, select, button { display: block; width: 100%; padding: 10px; margin: 10px 0; }
        .card-adm { border: 1px solid #ff0000; padding: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>PAINEL DE CONTROLE - OFICINA</h2>
    <div class="card-adm">
        <input type="text" id="nome" placeholder="Nome do Produto (Ex: Shape Maple)">
        <input type="number" id="preco" placeholder="Preço (Ex: 199.90)">
        <input type="text" id="img" placeholder="Link da Imagem">
        <select id="cat">
            <option value="SHAPES">SHAPES</option>
            <option value="RODAS">RODAS</option>
            <option value="CAMISETA">CAMISETAS</option>
        </select>
        <button onclick="salvar()" style="background: #ff0000; color: #fff; font-weight: bold;">CADASTRAR PRODUTO</button>
    </div>

    <div id="lista-admin"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function salvar() {
            const nome = document.getElementById('nome').value;
            const preco = parseFloat(document.getElementById('preco').value);
            const img = document.getElementById('img').value;
            const cat = document.getElementById('cat').value;

            if(nome && preco && img) {
                db.collection("produtos_oficina").add({ nome, preco, img, cat })
                .then(() => { alert("Produto Lançado!"); location.reload(); });
            }
        }

        db.collection("produtos_oficina").onSnapshot(snap => {
            document.getElementById('lista-admin').innerHTML = snap.docs.map(doc => `
                <div class="card-adm">
                    ${doc.data().nome} - R$ ${doc.data().preco}
                    <button onclick="deletar('${doc.id}')" style="background:grey; width: auto; display: inline;">Apagar</button>
                </div>
            `).join('');
        });

        function deletar(id) {
            if(confirm("Remover esse item?")) db.collection("produtos_oficina").doc(id).delete();
        }
    </script>
</body>
</html>
