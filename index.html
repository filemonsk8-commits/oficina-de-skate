<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICINA DE SKATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; }
        
        /* RESTAURANDO LOGO E HEADER */
        header { background: #000; padding: 30px 10px; text-align: center; border-bottom: 5px solid #ff0000; }
        .logo-oficina { font-family: 'Bebas Neue'; font-size: 5rem; color: #ff0000; text-shadow: 4px 4px #fbff00; line-height: 1; }
        
        /* MISSÃO DINÂMICA */
        .missao-box { background: #111; padding: 15px; text-align: center; border-bottom: 2px solid #333; }
        #missao-texto { font-size: 0.85rem; color: #fbff00; text-transform: uppercase; }

        /* NAVEGAÇÃO DE CATEGORIAS (RESTAURADA) */
        .cat-nav { display: flex; overflow-x: auto; background: #111; padding: 15px 10px; gap: 12px; border-bottom: 2px solid #222; }
        .cat-btn { 
            background: #ff0000; color: #fff; border: none; padding: 12px 25px; 
            border-radius: 5px; font-family: 'Bebas Neue'; font-size: 1.2rem; 
            cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn:hover { background: #fbff00; color: #000; }

        /* VITRINE (ESTILO GRADE DO EDUARDO) */
        .vitrine { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .vitrine { grid-template-columns: repeat(4, 1fr); } }
        
        .produto-card { background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .produto-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
        .produto-nome { font-size: 0.75rem; height: 32px; overflow: hidden; margin-bottom: 5px; text-transform: uppercase; }
        .produto-preco { color: #fbff00; font-size: 1.1rem; margin-bottom: 8px; }
        .btn-add { background: #ff0000; color: #fff; border: none; width: 100%; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; }

        /* CARRINHO FIXO */
        #carrinho-fixo { position: fixed; bottom: 20px; right: 20px; background: #fbff00; color: #000; padding: 15px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 100; box-shadow: 0 5px 20px rgba(0,0,0,0.5); }
        
        /* MODAL CARRINHO */
        #modal-cart { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; }
        .cart-content { background: #111; border: 2px solid #ff0000; padding: 20px; width: 90%; max-width: 400px; border-radius: 10px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 10px 0; font-size: 0.8rem; }
        .btn-finalizar { background: #25d366; color: #fff; border: none; width: 100%; padding: 15px; margin-top: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1 class="logo-oficina">OFICINA</h1>
</header>

<div class="missao-box">
    <p id="missao-texto">CARREGANDO MISSÃO...</p>
</div>

<nav class="cat-nav">
    <button class="cat-btn" onclick="filtrar('TODOS')">TODOS</button>
    <button class="cat-btn" onclick="filtrar('SHAPES')">SHAPES</button>
    <button class="cat-btn" onclick="filtrar('RODAS')">RODAS</button>
    <button class="cat-btn" onclick="filtrar('ROLAMENTOS')">ROLAMENTOS</button>
    <button class="cat-btn" onclick="filtrar('TÊNIS')">TÊNIS</button>
    <button class="cat-btn" onclick="filtrar('BERMUDAS')">BERMUDAS</button>
    <button class="cat-btn" onclick="filtrar('CALÇAS')">CALÇAS</button>
</nav>

<div class="vitrine" id="vitrine-produtos"></div>

<div id="carrinho-fixo" onclick="abrirCarrinho()">
    <i class="fa-solid fa-cart-shopping"></i> <span id="cart-count">0</span> ITENS
</div>

<div id="modal-cart">
    <div class="cart-content">
        <h2 style="font-family: 'Bebas Neue'; color: #fbff00; margin-bottom: 15px;">SEU PEDIDO</h2>
        <div id="itens-no-carrinho" style="max-height: 250px; overflow-y: auto;"></div>
        <h3 id="total-carrinho" style="margin-top: 15px; text-align: right; color: #fbff00;">TOTAL: R$ 0,00</h3>
        <button class="btn-finalizar" onclick="enviarPedidoWhatsApp()">FINALIZAR NO WHATSAPP</button>
        <button onclick="fecharCarrinho()" style="background:none; color:#888; border:none; width:100%; margin-top:15px; cursor:pointer;">VOLTAR</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
        authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
        projectId: "oficina-de-skate-9c49b",
        storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
        messagingSenderId: "905657745716",
        appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let carrinho = [];

    // MISSÃO DINÂMICA
    db.collection("config").doc("site_data").onSnapshot(doc => {
        if(doc.exists && doc.data().missao) {
            document.getElementById('missao-texto').innerText = doc.data().missao;
        }
    });

    // CARREGAR VITRINE
    function carregarProdutos(filtro = 'TODOS') {
        db.collection("produtos_oficina").onSnapshot(snap => {
            const vitrine = document.getElementById('vitrine-produtos');
            vitrine.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                if(filtro === 'TODOS' || p.cat === filtro) {
                    vitrine.innerHTML += `
                        <div class="produto-card">
                            <img src="${p.img}">
                            <div class="produto-nome">${p.nome}</div>
                            <div class="produto-preco">R$ ${p.preco.toFixed(2)}</div>
                            <button class="btn-add" onclick="addCart('${p.nome}', ${p.preco})">ADICIONAR</button>
                        </div>`;
                }
            });
        });
    }

    function filtrar(cat) { carregarProdutos(cat); }
    carregarProdutos();

    // CARRINHO
    function addCart(nome, preco) {
        carrinho.push({ nome, preco });
        document.getElementById('cart-count').innerText = carrinho.length;
        alert("Adicionado!");
    }

    function abrirCarrinho() {
        if(carrinho.length === 0) return alert("O carrinho está vazio!");
        const modal = document.getElementById('modal-cart');
        const lista = document.getElementById('itens-no-carrinho');
        const totalTxt = document.getElementById('total-carrinho');
        modal.style.display = 'flex';
        lista.innerHTML = '';
        let total = 0;
        carrinho.forEach(item => {
            total += item.preco;
            lista.innerHTML += `<div class="cart-item"><span>${item.nome}</span><span>R$ ${item.preco.toFixed(2)}</span></div>`;
        });
        totalTxt.innerText = `TOTAL: R$ ${total.toFixed(2)}`;
    }

    function fecharCarrinho() { document.getElementById('modal-cart').style.display = 'none'; }

    // WHATSAPP
    function enviarPedidoWhatsApp() {
        let msg = "*🔥 SALVE, FAMÍLIA! PEDIDO NOVO NA ÁREA! 🔥*\n\n";
        let total = 0;
        carrinho.forEach((item, i) => {
            msg += `*${i+1}.* ${item.nome} - R$ ${item.preco.toFixed(2)}\n`;
            total += item.preco;
        });
        msg += `\n*TOTAL:* R$ ${total.toFixed(2)}\n\n*🚀 JÁ SEPARA QUE O DROP É MEU!*`;
        const meuZap = "5511999999999"; // COLOQUE SEU NÚMERO AQUI
        window.open(`https://wa.me/${meuZap}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
