<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OFICINA DE SKATE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; overflow-x: hidden; }

        /* HEADER */
        header { 
            background: #000; padding: 15px; display: flex; align-items: center; 
            justify-content: space-between; border-bottom: 4px solid #ff0000; position: sticky; top: 0; z-index: 1000;
        }
        .btn-menu { color: #ff0000; font-size: 1.8rem; cursor: pointer; padding: 5px; }
        .logo-img { height: 50px; } /* Ajuste o nome do arquivo da logo abaixo no HTML */

        /* SIDEBAR (MENU LATERAL) */
        .sidebar {
            position: fixed; top: 0; left: -100%; width: 280px; height: 100%;
            background: #111; z-index: 3000; transition: 0.4s; padding: 20px; border-right: 3px solid #ff0000;
        }
        .sidebar.active { left: 0; }
        .sidebar h2 { font-family: 'Bebas Neue'; color: #fbff00; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .sidebar-link { 
            display: block; color: #fff; text-decoration: none; padding: 15px 10px; 
            font-size: 1.2rem; border-bottom: 1px solid #222; font-family: 'Bebas Neue'; cursor: pointer;
        }
        .overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 2500; 
        }
        .overlay.active { display: block; }

        /* MISSÃO */
        .missao-box { background: #111; padding: 12px; text-align: center; border-bottom: 2px solid #333; }
        #missao-texto { font-size: 0.75rem; color: #fbff00; text-transform: uppercase; }

        /* VITRINE */
        .vitrine { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
        @media (min-width: 768px) { .vitrine { grid-template-columns: repeat(4, 1fr); } }
        
        .produto-card { background: #111; border: 1px solid #333; padding: 10px; border-radius: 8px; text-align: center; }
        .produto-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 5px; margin-bottom: 8px; }
        .produto-nome { font-size: 0.65rem; height: 32px; overflow: hidden; margin-bottom: 5px; color: #eee; }
        .produto-preco { color: #fbff00; font-size: 1rem; margin-bottom: 8px; }
        .btn-add { background: #ff0000; color: #fff; border: none; width: 100%; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }

        /* CARRINHO FIXO */
        #carrinho-fixo { position: fixed; bottom: 20px; right: 20px; background: #fbff00; color: #000; padding: 15px; border-radius: 50px; cursor: pointer; font-weight: bold; z-index: 100; display: flex; align-items: center; gap: 8px; }

        /* MODAL CARRINHO */
        #modal-cart { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 4000; align-items: center; justify-content: center; }
        .cart-content { background: #111; border: 2px solid #ff0000; padding: 20px; width: 90%; max-width: 400px; border-radius: 10px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.8rem; }
        .btn-remove { color: #ff4444; background: none; border: none; cursor: pointer; font-size: 1.1rem; padding-left: 10px; }
        .btn-finalizar { background: #25d366; color: #fff; border: none; width: 100%; padding: 15px; margin-top: 15px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<header>
    <div class="btn-menu" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
    <img src="logo.png" alt="OFICINA" class="logo-img" onerror="this.style.display='none'; this.after('OFICINA')">
    <div style="width: 30px;"></div>
</header>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>
<div class="sidebar" id="sidebar">
    <h2>CATEGORIAS</h2>
    <span class="sidebar-link" onclick="filtrar('TODOS')">TODOS OS PRODUTOS</span>
    <span class="sidebar-link" onclick="filtrar('SHAPES')">SHAPES</span>
    <span class="sidebar-link" onclick="filtrar('RODAS')">RODAS</span>
    <span class="sidebar-link" onclick="filtrar('ROLAMENTOS')">ROLAMENTOS</span>
    <span class="sidebar-link" onclick="filtrar('TÊNIS')">TÊNIS</span>
    <span class="sidebar-link" onclick="filtrar('BERMUDAS')">BERMUDAS</span>
    <span class="sidebar-link" onclick="filtrar('CALÇAS')">CALÇAS</span>
    <span class="sidebar-link" onclick="filtrar('HOOKAH THUG')">HOOKAH THUG</span>
</div>

<div class="missao-box">
    <p id="missao-texto">CARREGANDO MISSÃO...</p>
</div>

<div class="vitrine" id="vitrine-produtos"></div>

<div id="carrinho-fixo" onclick="abrirCarrinho()">
    <i class="fa-solid fa-cart-shopping"></i> <span id="cart-count">0</span>
</div>

<div id="modal-cart">
    <div class="cart-content">
        <h2 style="font-family: 'Bebas Neue'; color: #fbff00;">MEU PEDIDO</h2>
        <div id="itens-no-carrinho" style="max-height: 300px; overflow-y: auto; margin: 15px 0;"></div>
        <h3 id="total-carrinho" style="text-align: right; color: #fbff00; border-top: 1px solid #333; padding-top: 10px;">TOTAL: R$ 0,00</h3>
        <button class="btn-finalizar" onclick="enviarPedidoWhatsApp()">FINALIZAR NO WHATSAPP</button>
        <button onclick="fecharCarrinho()" style="background:none; color:#888; border:none; width:100%; margin-top:15px; cursor:pointer;">VOLTAR</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
        authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
        projectId: "oficina-de-skate-9c49b",
        storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
        messagingSenderId: "905657745716",
        appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let carrinho = [];

    // SOM DE CLICK (Aponte para o arquivo click.mpeg no seu Git)
    const somClick = new Audio('click.mpeg');

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    // MISSÃO DINÂMICA
    db.collection("config").doc("site_data").onSnapshot(doc => {
        if(doc.exists && doc.data().missao) {
            document.getElementById('missao-texto').innerText = doc.data().missao;
        }
    });

    // VITRINE
    function carregarProdutos(filtro = 'TODOS') {
        db.collection("produtos_oficina").onSnapshot(snap => {
            const vitrine = document.getElementById('vitrine-produtos');
            vitrine.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                if(filtro === 'TODOS' || p.cat === filtro) {
                    vitrine.innerHTML += `
                        <div class="produto-card">
                            <img src="${p.img}">
                            <div class="produto-nome">${p.nome}</div>
                            <div class="produto-preco">R$ ${p.preco.toFixed(2)}</div>
                            <button class="btn-add" onclick="addCart('${p.nome}', ${p.preco})">COMPRAR</button>
                        </div>`;
                }
            });
        });
        if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
    }

    function filtrar(cat) { carregarProdutos(cat); }
    carregarProdutos();

    // CARRINHO COM OPÇÃO DE APAGAR
    function addCart(nome, preco) {
        carrinho.push({ nome, preco });
        atualizarContador();
        somClick.play().catch(()=>{});
    }

    function atualizarContador() {
        document.getElementById('cart-count').innerText = carrinho.length;
    }

    function abrirCarrinho() {
        if(carrinho.length === 0) return alert("Carrinho vazio!");
        const modal = document.getElementById('modal-cart');
        const lista = document.getElementById('itens-no-carrinho');
        modal.style.display = 'flex';
        renderizarItensCarrinho();
    }

    function renderizarItensCarrinho() {
        const lista = document.getElementById('itens-no-carrinho');
        lista.innerHTML = '';
        let total = 0;
        carrinho.forEach((item, index) => {
            total += item.preco;
            lista.innerHTML += `
                <div class="cart-item">
                    <span>${item.nome}</span>
                    <div>
                        <span>R$ ${item.preco.toFixed(2)}</span>
                        <button class="btn-remove" onclick="removerItem(${index})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>`;
        });
        document.getElementById('total-carrinho').innerText = `TOTAL: R$ ${total.toFixed(2)}`;
    }

    function removerItem(index) {
        carrinho.splice(index, 1);
        atualizarContador();
        if(carrinho.length === 0) fecharCarrinho();
        else renderizarItensCarrinho();
    }

    function fecharCarrinho() { document.getElementById('modal-cart').style.display = 'none'; }

    // WHATSAPP
    function enviarPedidoWhatsApp() {
        let msg = "*🔥 SALVE, FAMÍLIA! PEDIDO NOVO NA ÁREA! 🔥*\n\n";
        let total = 0;
        carrinho.forEach((item, i) => {
            msg += `*${i+1}.* ${item.nome} - R$ ${item.preco.toFixed(2)}\n`;
            total += item.preco;
        });
        msg += `\n*TOTAL:* R$ ${total.toFixed(2)}\n\n*🚀 JÁ SEPARA QUE O DROP É MEU!*`;
        const meuZap = "5511999999999"; // COLOQUE SEU NÚMERO AQUI
        window.open(`https://wa.me/${meuZap}?text=${encodeURIComponent(msg)}`, '_blank');
    }
</script>
</body>
</html>
