<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oficina de Skate - Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo+Black&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: 'Archivo Black', sans-serif; overflow-x: hidden; }

        /* MENU LATERAL */
        #side-menu {
            position: fixed; left: -280px; top: 0; width: 280px; height: 100%;
            background: #111; transition: 0.4s; z-index: 1000; border-right: 4px solid #ff0000;
            padding: 25px;
        }
        #side-menu.active { left: 0; }
        .menu-title { font-family: 'Bebas Neue'; color: #ff0000; font-size: 2rem; margin-bottom: 20px; border-bottom: 2px solid #333; }
        .menu-item { 
            display: flex; align-items: center; padding: 15px 0; color: #fff; text-decoration: none; 
            font-family: 'Bebas Neue'; font-size: 1.4rem; gap: 10px; transition: 0.3s;
        }
        .menu-item:hover { color: #fbff00; }
        .menu-item i { color: #25d366; width: 25px; } /* Cor verde do Whats */

        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 950; }

        header { background: #000; padding: 15px; text-align: center; border-bottom: 5px solid #ff0000; position: sticky; top: 0; z-index: 900; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'Bebas Neue'; font-size: 2.5rem; color: #ff0000; flex-grow: 1; letter-spacing: 2px; }
        .menu-icon { font-size: 1.8rem; cursor: pointer; color: #fff; padding: 0 10px; }

        /* FILTROS */
        .filtros { display: flex; overflow-x: auto; padding: 15px 10px; gap: 10px; background: #111; scrollbar-width: none; }
        .filtros::-webkit-scrollbar { display: none; }
        .btn-filter { background: #000; color: #fff; border: 1px solid #ff0000; padding: 10px 18px; cursor: pointer; font-family: 'Bebas Neue'; font-size: 1rem; border-radius: 4px; }
        .btn-filter.active { background: #ff0000; border-color: #fff; }

        /* VITRINE */
        .vitrine { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: #111; border: 1px solid #333; padding: 10px; text-align: center; border-radius: 8px; transition: 0.3s; }
        .card:hover { border-color: #ff0000; }
        .img-container { overflow: hidden; border-radius: 5px; background: #fff; height: 150px; display: flex; align-items: center; justify-content: center; }
        .card img { max-width: 90%; max-height: 90%; transition: 0.5s; cursor: zoom-in; }
        .card img:hover { transform: scale(1.5); }
        .price { color: #fbff00; font-size: 1.4rem; margin: 10px 0; font-family: 'Bebas Neue'; }
        .btn-buy { width: 100%; background: #ff0000; color: #fff; border: none; padding: 12px; font-family: 'Archivo Black'; cursor: pointer; font-size: 0.75rem; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="toggleMenu()"></div>

    <nav id="side-menu">
        <div class="menu-title">CONTATO OFICINA</div>
        
        <a href="https://wa.me/5562997021174?text=Salve! Vi no site e gostaria de falar com a Loja 1" target="_blank" class="menu-item">
            <i class="fa-brands fa-whatsapp"></i> CONTATO LOJA 1
        </a>

        <a href="https://wa.me/5562000000000?text=Salve! Vi no site e gostaria de falar com a Loja 2" target="_blank" class="menu-item">
            <i class="fa-brands fa-whatsapp"></i> CONTATO LOJA 2
        </a>

        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <a href="admin.html" class="menu-item" style="font-size: 0.9rem; color: #444;"><i class="fa-solid fa-lock"></i> PAINEL ADM</a>
    </nav>

    <header>
        <div class="menu-icon" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></div>
        <div class="logo">OFICINA</div>
        <div style="width: 40px;"></div>
    </header>

    <div class="filtros">
        <button class="btn-filter active" onclick="selecionarFiltro(this, 'TODOS')">TODOS</button>
        <button class="btn-filter" onclick="selecionarFiltro(this, 'SHAPES')">SHAPES</button>
        <button class="btn-filter" onclick="selecionarFiltro(this, 'RODAS')">RODAS</button>
        <button class="btn-filter" onclick="selecionarFiltro(this, 'ROLAMENTOS')">ROLAMENTOS</button>
        <button class="btn-filter" onclick="selecionarFiltro(this, 'TRUCK')">TRUCKS</button>
    </div>

    <div class="vitrine" id="vitrine-produtos"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBglWuR5mY-JRlJdFoEwGl5jkpMznGCls4",
            authDomain: "oficina-de-skate-9c49b.firebaseapp.com",
            projectId: "oficina-de-skate-9c49b",
            storageBucket: "oficina-de-skate-9c49b.firebasestorage.app",
            messagingSenderId: "905657745716",
            appId: "1:905657745716:web:d1f3b3bff6a26bada1e561"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function toggleMenu() {
            const m = document.getElementById('side-menu');
            const o = document.getElementById('overlay');
            m.classList.toggle('active');
            o.style.display = m.classList.contains('active') ? 'block' : 'none';
        }

        function selecionarFiltro(btn, cat) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            carregarVitrine(cat);
        }

        function carregarVitrine(categoria = 'TODOS') {
            const container = document.getElementById('vitrine-produtos');
            container.innerHTML = '<p style="grid-column: 1/-1; text-align:center;">CARREGANDO ESTOQUE...</p>';

            let ref = db.collection("produtos_oficina");
            if (categoria !== 'TODOS') ref = ref.where("cat", "==", categoria);

            ref.onSnapshot(snap => {
                container.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <div class="img-container"><img src="${p.img}"></div>
                            <h3 style="font-size:0.75rem; margin:10px 0; height:35px;">${p.nome}</h3>
                            <p class="price">R$ ${p.preco.toFixed(2)}</p>
                            <button class="btn-buy" onclick="toggleMenu()">COMPRAR / CONTATO</button>
                        </div>
                    `;
                });
            });
        }
        carregarVitrine();
    </script>
</body>
</html>
